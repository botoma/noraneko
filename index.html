    result:S=>S.chrm>=3
      ?`カラスはしばらく首を傾けたあと、なぜか飛んでいった。\n不思議な勝利だった。\n<span class="hl-gain">愛嬌が上がった！</span>`
      :`カラスには通じなかった。でも威嚇もされなかった。\n<span class="hl-gain">愛嬌が少し上がった。</span>`},
 ]},

{id:'rain_night',label:'── 嵐の夜 ──',scene:'alley_rain',
 text:S=>`夜半、急に土砂降りになった。\n段ボールの隠れ家が水浸しになりそうだ。\n体が冷えていく。\n遠くに、窓明かりのついた民家が見える。`,
 choices:[
   {text:'民家の縁側に駆け込む',hints:[{t:'chrm',s:'+'},{t:'hp',s:'+'}],
    deltas:S=>rnd()<0.4+S.chrm*0.06?[{s:'chrm',v:1},{s:'maxhp',v:2},{s:'hp',v:3},{s:'kind',v:1}]:[{s:'chrm',v:1},{s:'hp',v:-2}],
    result:S=>S.hp>6
      ?`窓からおばあさんが顔を出した。「まあかわいそうに」\nあたたかい部屋に入れてもらい、ごはんをもらった。\n<span class="hl-strong">最大体力が増えた！愛嬌も上がった！</span>`
      :`縁側には番犬がいた。\n吠えられて雨の中に逃げ帰った。\n<span class="hl-loss">体力が減った。</span>`},
   {text:'橋の下で雨をしのぐ',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'guts',v:1},{s:'solo',v:1},{s:'hp',v:1}],
    result:`川沿いの橋の下に乾いた場所を見つけた。\n一晩、冷たい風の中でじっと耐えた。\n<span class="hl-gain">賢さが上がった。</span>`},
   {text:'ずぶ濡れのまま耐え抜く',hints:[{t:'hp',s:'-'}],
    deltas:[{s:'guts',v:2},{s:'solo',v:2},{s:'hp',v:-3}],
    result:`全身ずぶ濡れで朝を迎えた。\nどんな雨にも揺るがない芯ができた気がした。\n<span class="hl-loss">体力は減ったが</span>、何か失わないものを得た。`},
 ]},

{id:'kitten_rival',label:'── 縄張り争い ──',scene:'park_day',
 text:S=>`公園に食べ物が落ちていた。\n同時に別の仔猫もそこへ駆けてきた。\n歯を剥いて威嚇している。`,
 choices:[
   {text:'真っ向勝負を挑む',hints:[{t:'pow',s:'+'},{t:'mnc',s:'+'},{t:'hp',s:'-'}],
    deltas:S=>S.pow>=3?[{s:'pow',v:1},{s:'mnc',v:1},{s:'guts',v:1},{s:'hp',v:-2}]:[{s:'guts',v:1},{s:'hp',v:-4}],
    result:S=>S.pow>=3
      ?`激しい取っ組み合いの末、相手を追い払った。\n傷を負ったが食べ物は手に入った。\n<span class="hl-gain">パワーと迫力が上がった！</span>`
      :`返り討ちにあった。食べ物も取られた。\n<span class="hl-loss">ひどく体力が減った。</span>`},
   {text:'目にも止まらぬ速さで横取りして逃げる',hints:[{t:'spd',s:'+'}],
    deltas:S=>S.spd>=3?[{s:'spd',v:1},{s:'cruel',v:1},{s:'hp',v:2}]:[{s:'spd',v:1},{s:'cruel',v:1}],
    result:S=>S.spd>=3
      ?`相手が反応する前に食べ物をくわえて消えた。\n<span class="hl-strong">速さが磨かれた！</span>`
      :`ギリギリ逃げ切った。速さが身についた。\n<span class="hl-gain">速さが上がった。</span>`},
   {text:'半分分けようと鳴きかける',hints:[{t:'chrm',s:'+'}],
    deltas:[{s:'chrm',v:1},{s:'kind',v:1},{s:'hp',v:1}],
    result:`相手は一瞬止まり、2匹で食べた。\n争いを避ける知恵がついた。\n<span class="hl-gain">愛嬌が上がった。</span>`},
 ]},

{id:'old_cat',label:'── 老猫の眼差し ──',scene:'shrine',
 text:S=>`古い神社の境内に、毛並みのよれた老猫がいた。\n${nm()}をじっと見て、何かを測るような目をしている。\n足元には干し魚が少し落ちている。`,
 choices:[
   {text:'老猫に食べ物を分けてやる',hints:[{t:'chrm',s:'+'}],
    deltas:[{s:'kind',v:2},{s:'chrm',v:1},{s:'hp',v:-1}],
    result:`老猫はゆっくり食べ、${nm()}を一度だけ見た。\nその目には、何か柔らかいものがあった。\n<span class="hl-gain">愛嬌が上がった。</span>`},
   {text:'老猫の動きをじっくり観察する',hints:[{t:'smt',s:'+'},{t:'mnc',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'mnc',v:1}],
    result:`老猫の歩き方、縄張りの守り方——長年生き抜いた猫の知恵を読み取った。\n<span class="hl-gain">賢さと迫力が上がった。</span>`},
   {text:'干し魚を奪い取る',hints:[{t:'pow',s:'+'}],
    deltas:[{s:'pow',v:1},{s:'cruel',v:1},{s:'hp',v:2}],
    result:`老猫は抵抗できなかった。お腹は満たされた。\n<span class="hl-gain">パワーが上がった。</span>\nでも老猫の静かな目が、ずっと頭に残った。`},
 ]},

// ── ここから新規子猫期イベント ──

{id:'ch1_puddle',label:'── 水たまり ──',scene:'alley_day',
 text:S=>`雨上がりの路地に大きな水たまりができていた。\n${nm()}は近づいて、水面に映る自分の顔を見た。\n……なんだこれは。`,
 choices:[
   {text:'パンチする',hints:[{t:'spd',s:'+'},{t:'pow',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'pow',v:1}],
    result:`水が飛び散った。顔も濡れた。\nでも気持ちよかった。\n<span class="hl-gain">速さとパワーが上がった！</span>`},
   {text:'水を飲む',hints:[{t:'hp',s:'+'}],
    deltas:[{s:'hp',v:2},{s:'smt',v:1}],
    result:`冷たくて、少し泥っぽかった。でもお腹が潤った。\n<span class="hl-gain">体力が回復した。賢さも少し上がった。</span>`},
   {text:'じっと見つめる',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'solo',v:1}],
    result:`水面の中の自分と、しばらく目が合っていた。\n何かを考えていた。何を考えていたかはわからない。\n<span class="hl-gain">賢さが上がった。</span>`},
 ]},

{id:'ch1_dog_chase',label:'── 犬に追われた ──',scene:'alley_day',
 text:S=>`散歩中の犬がリードを引きちぎって突進してきた。\n大きい。速い。そして明らかに本気だ。\n全力で逃げるしかない。`,
 choices:[
   {text:'全速力で駆け抜ける',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:2},{s:'guts',v:1}],
    result:`必死に走った。角を曲がり、塀を越え、なんとか撒いた。\n足が震えていた。でも速くなった気がした。\n<span class="hl-strong">速さが大きく上がった！</span>`},
   {text:'塀の上に飛び乗る',hints:[{t:'spd',s:'+'},{t:'smt',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'smt',v:1}],
    result:`犬は地面に取り残された。\n塀の上から見下ろすと、なんだか小さく見えた。\n<span class="hl-gain">速さと賢さが上がった。</span>`},
 ]},

{id:'ch1_kind_human',label:'── 優しい手 ──',scene:'park_day',
 text:S=>`公園のベンチで弁当を食べているサラリーマンがいた。\n${nm()}に気づいて、立ち止まった。\n「お腹すいてるの?」`,
 choices:[
   {text:'おそるおそる近づく',hints:[{t:'chrm',s:'+'},{t:'hp',s:'+'}],
    deltas:S=>rnd()<0.5+S.chrm*0.05?[{s:'chrm',v:1},{s:'hp',v:4},{s:'kind',v:1}]:[{s:'chrm',v:1},{s:'hp',v:1}],
    result:S=>S.hp>7
      ?`男性は弁当のから揚げを一つくれた。\nあたたかかった。\n<span class="hl-gain">愛嬌が上がり、体力が大幅回復！</span>`
      :`男性はスマホで写真を撮って、去っていった。\n<span class="hl-gain">愛嬌が上がった。</span>`},
   {text:'警戒して遠くから見る',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'solo',v:1}],
    result:`人間は信用できない。\nでも男性はただ弁当を食べ終えて、立ち去った。\n<span class="hl-gain">賢さが上がった。</span>`},
   {text:'思いきってゴロンと転がる',hints:[{t:'chrm',s:'+'}],
    deltas:[{s:'chrm',v:2},{s:'hp',v:3},{s:'kind',v:1}],
    result:`男性は「なんだこいつ」と笑って、弁当を半分近くくれた。\n<span class="hl-strong">愛嬌が大きく上がった！体力も回復！</span>`},
 ]},

{id:'ch1_first_fight',label:'── はじめての喧嘩 ──',scene:'alley_night',
 text:S=>`夜の路地で、自分よりひと回り大きい野良猫と鉢合わせた。\n相手はうなり声を上げている。\nここは一本道で、逃げ場がない。`,
 choices:[
   {text:'精一杯威嚇して立ち向かう',hints:[{t:'pow',s:'+'},{t:'mnc',s:'+'}],
    deltas:[{s:'pow',v:1},{s:'mnc',v:1},{s:'guts',v:1},{s:'hp',v:-2}],
    result:`傷を負いながらも、相手を怯ませた。\n最終的に相手が引いた。\n<span class="hl-gain">パワーと迫力が上がった。</span>`},
   {text:'体を小さく丸めて通してもらう',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'hp',v:1}],
    result:`相手は鼻を鳴らして通り過ぎた。\n賢い判断だった。\n<span class="hl-gain">賢さが上がった。</span>`},
   {text:'隙を見て猛ダッシュで突破する',hints:[{t:'spd',s:'+'}],
    deltas:S=>S.spd>=2?[{s:'spd',v:1},{s:'hp',v:1}]:[{s:'spd',v:1},{s:'hp',v:-1}],
    result:S=>S.spd>=2
      ?`一瞬の隙に全速力で抜けた。\n相手は呆気に取られていた。\n<span class="hl-gain">速さが上がった。</span>`
      :`突破しようとしたが引っかかれた。\nでも逃げ切った。\n<span class="hl-gain">速さが上がった。</span>`},
 ]},

{id:'ch1_food_smell',label:'── 食欲という本能 ──',scene:'alley_day',
 text:S=>`路地を歩いていると、どこからともなく焼き魚のにおいがした。\n鼻が勝手についていく。\n民家の台所の窓が少し開いていた。`,
 choices:[
   {text:'窓から覗いてみる',hints:[{t:'smt',s:'+'}],
    deltas:S=>rnd()<0.4?[{s:'smt',v:1},{s:'hp',v:3}]:[{s:'smt',v:1}],
    result:S=>S.hp>6
      ?`中のおばさんが${nm()}に気づいて、魚の切れ端を投げてくれた。\n<span class="hl-gain">賢さが上がり、体力も回復！</span>`
      :`中を覗いたが、誰もいなかった。\nにおいだけが残った。\n<span class="hl-gain">賢さが上がった。</span>`},
   {text:'鳴いてアピールする',hints:[{t:'chrm',s:'+'}],
    deltas:S=>rnd()<0.5+S.chrm*0.05?[{s:'chrm',v:1},{s:'hp',v:4}]:[{s:'chrm',v:1},{s:'hp',v:-1}],
    result:S=>S.hp>6
      ?`声を聞いたお父さんが出てきて、魚をくれた。\n<span class="hl-gain">愛嬌が上がり、体力回復！</span>`
      :`叱られて追い払われた。\nお腹は空いたまま。\n<span class="hl-gain">愛嬌だけが上がった。</span>`},
   {text:'諦めて立ち去る',hints:[],
    deltas:[{s:'guts',v:1},{s:'solo',v:1}],
    result:`欲しいものが手に入らない日もある。\n${nm()}はそれを学んだ。`},
 ]},

{id:'ch1_moon',label:'── はじめての夜空 ──',scene:'park_night',
 text:S=>`夜、${nm()}は初めて夜空を見上げた。\n満月だった。\n大きくて、眩しくて、なんだか怖かった。`,
 choices:[
   {text:'月に向かって鳴く',hints:[{t:'mnc',s:'+'}],
    deltas:[{s:'mnc',v:1},{s:'guts',v:1}],
    result:`声は静かな夜に響いた。\n怖いものに声で立ち向かう、それが${nm()}のやり方だ。\n<span class="hl-gain">迫力が上がった。</span>`},
   {text:'じっと見続ける',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'solo',v:1}],
    result:`月はゆっくり動いていた。\n世界は広い、とぼんやり思った。\n<span class="hl-gain">賢さが上がった。</span>`},
   {text:'怖くなって草陰に隠れる',hints:[{t:'hp',s:'+'}],
    deltas:[{s:'hp',v:2},{s:'smt',v:1}],
    result:`草陰は安全だった。\n安全な場所を知ることも大事だ。\n<span class="hl-gain">体力が回復し、賢さが上がった。</span>`},
 ]},

{id:'ch1_leaf',label:'── 落ち葉 ──',scene:'park_day',
 text:S=>`風が吹いて、枯れ葉が一枚、くるくると舞い落ちてきた。\n${nm()}の目がそれを追う。\n足が勝手に動いていた。`,
 choices:[
   {text:'全力で追いかける',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:1}],
    result:`葉は風に乗って逃げ続けた。\n全力で走り回ったが、捕まえられなかった。\nそれでも楽しかった。\n<span class="hl-gain">速さが上がった。</span>`},
   {text:'ジャンプして捕まえる',hints:[{t:'spd',s:'+'},{t:'pow',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'pow',v:1}],
    result:`空中でパシッと捕まえた。\n葉はくしゃっとなった。\nちょっと誇らしい気分だった。\n<span class="hl-gain">速さとパワーが上がった！</span>`},
   {text:'眺めるだけにする',hints:[],
    deltas:[{s:'smt',v:1},{s:'solo',v:1}],
    result:`葉はどこかへ飛んでいった。\n${nm()}はそれをずっと目で追っていた。\n<span class="hl-gain">賢さが上がった。</span>`},
 ]},

{id:'ch1_older_cat_lesson',label:'── 先輩の教え ──',scene:'alley_day',
 text:S=>`路地の奥に、中くらいの野良猫がいた。\nこちらに気づいて、近づいてきた。\n威嚇ではなく、ただ見ている。`,
 choices:[
   {text:'素直に頭を下げる',hints:[{t:'smt',s:'+'},{t:'chrm',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'chrm',v:1},{s:'hp',v:2},{s:'kind',v:1}],
    result:`先輩猫は食べ物の場所と、危険な犬のことを教えてくれた。\n<span class="hl-gain">賢さと愛嬌が上がり、体力も回復！</span>`},
   {text:'威嚇して近づけさせない',hints:[{t:'mnc',s:'+'}],
    deltas:[{s:'mnc',v:1},{s:'solo',v:1}],
    result:`先輩猫は少し驚いて、立ち去った。\n何も教えてもらえなかったが、迫力はついた。\n<span class="hl-gain">迫力が上がった。</span>`},
   {text:'無視して自分のペースで進む',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'solo',v:1}],
    result:`先輩猫はしばらく後ろから見ていたが、やがて去った。\n<span class="hl-gain">速さが上がった。</span>`},
 ]},

{id:'ch1_market',label:'── 市場の朝 ──',scene:'alley_day',
 text:S=>`早朝の市場。魚屋が仕込みをしている。\nコンテナから魚のにおいが漏れている。\n何人もの人が忙しく動き回っている。`,
 choices:[
   {text:'人の足元をすり抜けて近づく',hints:[{t:'spd',s:'+'},{t:'smt',s:'+'}],
    deltas:S=>S.spd>=2?[{s:'spd',v:1},{s:'smt',v:1},{s:'hp',v:3}]:[{s:'spd',v:1},{s:'hp',v:-1}],
    result:S=>S.spd>=2
      ?`誰にも気づかれず、魚のアラをゲットした。\n<span class="hl-gain">速さと賢さが上がり、体力回復！</span>`
      :`人の足に踏まれそうになって逃げた。\n<span class="hl-gain">速さだけが上がった。</span>`},
   {text:'威勢よく鳴いてアピールする',hints:[{t:'chrm',s:'+'}],
    deltas:S=>rnd()<0.4+S.chrm*0.06?[{s:'chrm',v:1},{s:'hp',v:4}]:[{s:'chrm',v:1},{s:'hp',v:-1}],
    result:S=>S.hp>6
      ?`魚屋のおじさんが笑って、内臓のくずをくれた。\n<span class="hl-gain">愛嬌が上がり、体力回復！</span>`
      :`うるさいと怒鳴られて追い払われた。\n<span class="hl-gain">愛嬌だけが上がった。</span>`},
   {text:'遠くから観察して隙を探す',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'hp',v:2}],
    result:`人の動きのパターンを読んで、完璧なタイミングで魚をもらった。\n<span class="hl-gain">賢さが上がり、体力も回復。</span>`},
 ]},

{id:'ch1_thunder',label:'── 雷の夜 ──',scene:'alley_rain',
 text:S=>`突然、空が光って轟音が鳴り響いた。\n${nm()}は思わず体が固まった。\n生まれて初めて聞く、恐ろしい音だった。`,
 choices:[
   {text:'じっと耐える',hints:[{t:'guts',s:'+'}],
    deltas:[{s:'guts',v:2},{s:'hp',v:-1}],
    result:`雷は何度も鳴った。\nそのたびに体が震えたが、逃げなかった。\nやがて嵐は過ぎ去った。\n何かに打ち勝った気がした。`},
   {text:'安全な隙間に潜り込む',hints:[{t:'smt',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'hp',v:2}],
    result:`自動販売機の裏の狭い空間に入り込んだ。\n暗くて狭かったが、安全だった。\n<span class="hl-gain">賢さが上がり、体力も回復。</span>`},
   {text:'鳴き声を上げながら走り回る',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'chrm',v:1},{s:'hp',v:2}],
    result:`パニックになって走り回ったら、通りかかった女性に拾われた。\n一晩、温かい部屋で過ごした。\n<span class="hl-gain">速さと愛嬌が上がり、体力回復！</span>`},
 ]},
],

// ══════════════════════════ CH2: 若猫期（30本）══════════════════════════
[
{id:'territory_boss',label:'── ボス猫との対峙 ──',scene:'alley_night',
 text:S=>`夜の路地に、大きな雄猫が立ちはだかっていた。\n体中に古い傷跡。この地域を長年支配してきたボスだ。\n「ここを通りたければ、俺を越えていけ」——全身でそう語っている。\n\nパワー＋迫力：${S.pow+S.mnc}`,
 choices:[
   {text:'目をそらさずにらみ返す',hints:[{t:'mnc',s:'+'},{t:'pow',s:'+'}],
    deltas:S=>S.pow+S.mnc>=8?[{s:'mnc',v:2},{s:'pow',v:1},{s:'guts',v:1}]:[{s:'mnc',v:1},{s:'guts',v:1},{s:'hp',v:-4}],
    result:S=>S.pow+S.mnc>=8
      ?`ボス猫はしばらく睨み合ったあと、ゆっくりと道を開けた。\n認めた、という目だった。\n<span class="hl-strong">迫力が大きく上がった！パワーも上昇！</span>`
      :`ボス猫は容赦なく突進してきた。\n逃げながらも、意地だけは見せた。\n<span class="hl-loss">体力が大幅に減ったが</span>、<span class="hl-gain">迫力がついた。</span>`},
   {text:'腹を見せて服従する',hints:[{t:'smt',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'hp',v:4}],
    result:`ボス猫は鼻を鳴らして去った。\n今は勝てない。賢い引き際だった。\n<span class="hl-gain">賢さが上がった。体力も温存できた。</span>`},
   {text:'素早く隙間を抜けて逃げる',hints:[{t:'spd',s:'+'},{t:'smt',s:'+'}],
    deltas:S=>S.spd>=5?[{s:'spd',v:1},{s:'smt',v:1},{s:'hp',v:2}]:[{s:'spd',v:1},{s:'smt',v:1}],
    result:S=>S.spd>=5
      ?`${nm()}の速さはボスを上回っていた。\n一瞬の隙をついて路地を抜けた。\n<span class="hl-strong">速さが上がった！</span>`
      :`ギリギリで逃げ切った。速さと知恵が身についた。\n<span class="hl-gain">速さと賢さが上がった。</span>`},
 ]},

{id:'human_child',label:'── 子どもの手 ──',scene:'park_day',
 text:S=>`公園で小さな子どもが手を伸ばしてきた。\n「ねこ！ねこ！」と叫びながら追いかけてくる。\n悪意はなさそうだが、手加減を知らない子どもの力でつかまれたらどうなるかわからない。`,
 choices:[
   {text:'全速力で逃げる',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:1}],
    result:`子どもを完全に撒いた。\n速さに磨きがかかった。\n<span class="hl-gain">速さが上がった。</span>`},
   {text:'おとなしく撫でさせてやる',hints:[{t:'chrm',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'chrm',v:2},{s:'kind',v:1},{s:'hp',v:3}],
    result:`子どもはわっと喜んで頭を撫でてくれた。\nそのうち母親が来て、ご飯までくれた。\n<span class="hl-strong">愛嬌が大きく上がった！体力も回復。</span>`},
   {text:'シャーッと威嚇する',hints:[{t:'mnc',s:'+'}],
    deltas:[{s:'mnc',v:1},{s:'cruel',v:1}],
    result:`子どもは泣き出した。でも距離をとってくれた。\n<span class="hl-gain">迫力が上がった。</span>\n子どもの泣き声が、しばらく耳に残った。`},
 ]},

{id:'disease',label:'── 体調不良 ──',scene:'alley_rain',
 text:S=>`ここ数日、体がだるい。\n鼻水が出て、くしゃみが止まらない。\n目やにで視界がかすんでいる。\n動くのが辛いが、食べ物を探さなければ。`,
 choices:[
   {text:'無理をしても食べ物を探し回る',hints:[{t:'hp',s:'-'}],
    deltas:[{s:'guts',v:2},{s:'hp',v:-3}],
    result:`ふらつきながらも食べ物を確保した。\n<span class="hl-loss">体力がさらに減った。</span>でも、倒れなかった。`},
   {text:'自販機の裏で温まりながら休む',hints:[{t:'smt',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'hp',v:4}],
    result:`機械の排熱で体が温まった。翌日、かなり楽になった。\n<span class="hl-gain">賢さが上がり、体力が回復した。</span>`},
   {text:'人通りの多い場所で鳴き続ける',hints:[{t:'chrm',s:'+'}],
    deltas:S=>rnd()<0.3+S.chrm*0.07?[{s:'chrm',v:1},{s:'hp',v:6},{s:'kind',v:1}]:[{s:'chrm',v:1},{s:'hp',v:-1}],
    result:S=>S.hp>8
      ?`心配した女性が動物病院に連れて行ってくれた。\n薬をもらって一気に回復した！\n<span class="hl-strong">愛嬌が上がり、体力が大幅回復！</span>`
      :`みんなに無視されたまま夜になった。\n<span class="hl-loss">体力がさらに減った。</span>`},
 ]},

{id:'restaurant_back',label:'── 料理屋の裏口 ──',scene:'alley_day',
 text:S=>`魚屋の裏口からいい匂いがしている。\n中年の板前が生ゴミを捨てに来た。\nこちらに気づいて、立ち止まっている。\n\n愛嬌：${S.chrm}`,
 choices:[
   {text:'愛想よくすり寄る',hints:[{t:'chrm',s:'+'},{t:'hp',s:'+'}],
    deltas:S=>S.chrm>=5?[{s:'chrm',v:1},{s:'maxhp',v:1},{s:'hp',v:5},{s:'kind',v:1}]:[{s:'chrm',v:1},{s:'hp',v:3}],
    result:S=>S.chrm>=5
      ?`板前は目を細めて「今日は特別だぞ」と新鮮な魚をくれた。\n<span class="hl-strong">愛嬌が上がり、最大体力まで増えた！</span>`
      :`板前はしゃがんで頭を撫で、魚のアラをくれた。\n<span class="hl-gain">愛嬌が上がり、体力回復！</span>`},
   {text:'素早くゴミ袋に飛びかかる',hints:[{t:'spd',s:'+'}],
    deltas:S=>S.spd>=4?[{s:'spd',v:1},{s:'hp',v:3}]:[{s:'spd',v:1},{s:'hp',v:-1}],
    result:S=>S.spd>=4
      ?`板前が怒鳴るより先に魚をくわえて逃げた。\n<span class="hl-gain">速さが上がった！</span>`
      :`板前に水をかけられ、びしょ濡れで逃げた。\n<span class="hl-loss">体力が少し減った。</span>`},
   {text:'遠くから様子を伺う',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'hp',v:2}],
    result:`板前が去ったあと、ゆっくりアラをもらった。\n慎重さが身についた。<span class="hl-gain">賢さが上がった。</span>`},
 ]},

{id:'wounded_bird',label:'── 傷ついた鳥 ──',scene:'park_day',
 text:S=>`草むらに、翼を怪我したすずめがいた。\n飛べずにぴょんぴょん跳ねている。\nお腹は少し減っている。`,
 choices:[
   {text:'躊躇わず仕留める',hints:[{t:'pow',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'pow',v:1},{s:'cruel',v:2},{s:'hp',v:4}],
    result:`本能のまま行動した。腹は満たされた。\n<span class="hl-gain">パワーが上がり、体力が回復した。</span>\nなんとなく、しばらく空を見上げた。`},
   {text:'近づいて匂いを嗅ぐだけにする',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'kind',v:2},{s:'smt',v:1}],
    result:`ちいさな命の鼓動を感じた。\nなぜかそのまま立ち去った。\n<span class="hl-gain">賢さが上がった。</span>\n空腹はつづく。`},
   {text:'追いかけ回して遊ぶ',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'cruel',v:1}],
    result:`鳥は必死に逃げた。追いかけることで足が速くなった。\n<span class="hl-gain">速さが上がった。</span>`},
 ]},

{id:'lost_kitten',label:'── 迷子の仔猫 ──',scene:'alley_night',
 text:S=>`夜の路地で、生まれて間もない仔猫が一匹、\n親とはぐれて鳴き続けていた。\n親の姿はどこにもない。\n自分もかつてはこうだったと、ふと思う。`,
 choices:[
   {text:'自分の食べ物を分けてやる',hints:[{t:'chrm',s:'+'}],
    deltas:[{s:'kind',v:2},{s:'chrm',v:1},{s:'hp',v:-1}],
    result:`仔猫は少し落ち着いた。\n${nm()}は自分の境遇を思い出しながら、食べ物を与えた。\n<span class="hl-gain">愛嬌が上がった。</span>`},
   {text:'夜明けまで傍にいて守る',hints:[{t:'mnc',s:'+'}],
    deltas:[{s:'guts',v:1},{s:'kind',v:1},{s:'mnc',v:1}],
    result:`夜明けまで傍に居続けた。翌朝、人間が仔猫を保護した。\n<span class="hl-gain">迫力が上がった。</span>`},
   {text:'自分には関係ないと去る',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'cruel',v:1},{s:'spd',v:1},{s:'solo',v:1}],
    result:`野良に感情移入は禁物だ、と言い聞かせた。\n仔猫の鳴き声がしばらく頭から離れなかった。\n<span class="hl-gain">速さが上がった。</span>`},
 ]},

{id:'summer_heat',label:'── 猛暑の昼 ──',scene:'summer',
 text:S=>`灼熱の夏。アスファルトが焼けて足裏が熱い。\n体の水分がどんどん失われていく。\n遠くに公園の噴水が見えるが、人が多い。\n\n賢さ：${S.smt}`,
 choices:[
   {text:'噴水に一直線に向かう',hints:[{t:'spd',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'hp',v:3}],
    result:`子どもたちの横をすり抜け、噴水で水を飲んだ。\n涼しくなった。<span class="hl-gain">速さが上がり体力回復！</span>`},
   {text:'コンビニの入口に陣取る',hints:[{t:'smt',s:'+'},{t:'chrm',s:'+'}],
    deltas:S=>S.smt>=5?[{s:'smt',v:1},{s:'chrm',v:1},{s:'hp',v:5}]:[{s:'smt',v:1},{s:'hp',v:2}],
    result:S=>S.smt>=5
      ?`店員が水とご飯をくれた。賢い選択だった。\n<span class="hl-strong">賢さと愛嬌が上がり、たっぷり体力回復！</span>`
      :`しばらくして追い払われたが、涼めた。\n<span class="hl-gain">賢さが上がった。</span>`},
   {text:'地面に伏せて夕方まで耐える',hints:[{t:'hp',s:'-'}],
    deltas:[{s:'guts',v:1},{s:'hp',v:-1}],
    result:`日が暮れて涼しくなった。\n<span class="hl-loss">体力は少し減ったが</span>、耐えた。`},
 ]},

{id:'garbage_day',label:'── ゴミ収集日の朝 ──',scene:'alley_day',
 text:S=>`今日はゴミ収集日。\nカラスや野良猫たちが集まっている。\n食べ物は豊富だが競争も激しい。\n\n速さ：${S.spd}　迫力：${S.mnc}`,
 choices:[
   {text:'最速で一番いいものを取る',hints:[{t:'spd',s:'+'},{t:'smt',s:'+'}],
    deltas:S=>S.spd>=5?[{s:'spd',v:1},{s:'smt',v:1},{s:'hp',v:4}]:[{s:'spd',v:1},{s:'hp',v:2}],
    result:S=>S.spd>=5
      ?`誰より早く動き、上等な魚をゲットした。\n誰も${nm()}の速さについてこれなかった。\n<span class="hl-strong">速さと賢さが上がり、体力が大幅回復！</span>`
      :`他の猫と争いながらもそこそこの戦果を得た。\n<span class="hl-gain">速さが上がった。</span>`},
   {text:'他の猫を威圧して独占する',hints:[{t:'mnc',s:'+'},{t:'pow',s:'+'}],
    deltas:S=>S.mnc>=5?[{s:'mnc',v:1},{s:'pow',v:1},{s:'cruel',v:1},{s:'hp',v:5}]:[{s:'mnc',v:1},{s:'cruel',v:1},{s:'hp',v:2}],
    result:S=>S.mnc>=5
      ?`${nm()}の迫力に周囲が圧倒された。食べ物を独占した。\n<span class="hl-strong">迫力とパワーが上がった！</span>`
      :`何匹かは怯んだが、全員は退かなかった。\n<span class="hl-gain">迫力が上がった。</span>`},
   {text:'端っこで静かに残り物をもらう',hints:[],
    deltas:[{s:'kind',v:1},{s:'solo',v:1},{s:'hp',v:2}],
    result:`争わずに済んだ。残り物でも腹は満たせた。\nひとりで食べるのには、もう慣れた。`},
 ]},

{id:'sunny_nap',label:'── 日向ぼっこ ──',scene:'park_day',
 text:S=>`ぽかぽかした昼下がり、コンクリートの上が暖かい。\n特に何も起きない、ただの午後だった。\n\n${nm()}は目を細めながら、のびをした。`,
 choices:[
   {text:'そのままうとうとする',hints:[{t:'hp',s:'+'}],
    deltas:[{s:'hp',v:3},{s:'guts',v:1},{s:'solo',v:1}],
    result:`気づいたら夕方だった。\nこういう日も悪くない。\n<span class="hl-gain">体力が回復した。</span>`},
   {text:'鳥を目で追いながら過ごす',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'solo',v:1}],
    result:`カラスが飛んだ。すずめが跳ねた。\nただそれだけを、ずっと見ていた。\n<span class="hl-gain">速さが上がった。</span>`},
   {text:'通りすがりの猫に挨拶してみる',hints:[{t:'chrm',s:'+'}],
    deltas:[{s:'chrm',v:1},{s:'kind',v:1},{s:'solo',v:-1}],
    result:`相手は少し驚いて、でもしっぽを立てた。\n悪い気分じゃなかった。\n<span class="hl-gain">愛嬌が上がった。</span>`},
 ]},

{id:'cardboard_box',label:'── 謎の箱 ──',scene:'alley_day',
 text:S=>`路地に大きな段ボール箱が落ちていた。\n穴が開いていて、ちょうど頭が入るくらいの隙間がある。\nなぜか気になって仕方がない。`,
 choices:[
   {text:'とりあえず頭を突っ込んでみる',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'solo',v:1}],
    result:`中は暗くて、少し湿っていた。\nなんとなく落ち着く。\n${nm()}は少しの間そのまま動かなかった。\n<span class="hl-gain">賢さが上がった。</span>`},
   {text:'箱ごと占領する',hints:[{t:'mnc',s:'+'}],
    deltas:[{s:'mnc',v:1},{s:'solo',v:1},{s:'hp',v:2}],
    result:`箱の中で丸まった。最高の基地ができた。\n通りすがりの猫が羨ましそうにしていた。\n<span class="hl-gain">迫力が上がった。</span>`},
   {text:'箱の外側で爪を研ぐ',hints:[{t:'pow',s:'+'}],
    deltas:[{s:'pow',v:1}],
    result:`ガリガリと、気持ちよく爪が研げた。\n箱は少しボロボロになった。\n<span class="hl-gain">パワーが上がった。</span>`},
 ]},

{id:'own_shadow',label:'── あれはなんだ ──',scene:'park_day',
 text:S=>`夕方、西日の中を歩いていた。\nふと気づくと、地面に長い影が伸びていた。\n${nm()}は立ち止まり、その影をじっと見た。\n……なんか、動いた気がする。`,
 choices:[
   {text:'パンチする',hints:[{t:'pow',s:'+'},{t:'spd',s:'+'}],
    deltas:[{s:'pow',v:1},{s:'spd',v:1}],
    result:`影は逃げなかった。\nそれでも${nm()}は何度も追いかけた。\n気づいたら夕日が沈んでいた。\n<span class="hl-gain">パワーと速さが上がった！</span>`},
   {text:'しばらく観察してから立ち去る',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'solo',v:1}],
    result:`影は自分だと、すぐわかった。\nでも少し考えてしまった。\n<span class="hl-gain">賢さが上がった。</span>`},
 ]},

{id:'tv_sound',label:'── 聞こえてくる音 ──',scene:'alley_night',
 text:S=>`夜、民家の窓からテレビの笑い声が聞こえてきた。\n温かい光が、カーテン越しに漏れている。\nお腹はそんなに減っていない。ただ、立ち止まってしまった。`,
 choices:[
   {text:'窓の外でしばらく聞いている',hints:[{t:'chrm',s:'+'}],
    deltas:S=>rnd()<0.35+S.chrm*0.06
      ?[{s:'chrm',v:1},{s:'kind',v:1},{s:'hp',v:3},{s:'solo',v:-1}]
      :[{s:'chrm',v:1},{s:'solo',v:-1}],
    result:S=>S.hp>8
      ?`窓が少し開いて、おじさんが顔を出した。\n「おっ、いたのか」と魚をくれた。\n<span class="hl-gain">愛嬌が上がり、体力も回復した。</span>`
      :`笑い声はずっと続いていた。\n${nm()}はその場を離れた。\n<span class="hl-gain">愛嬌が上がった。</span>`},
   {text:'気にせず立ち去る',hints:[],
    deltas:[{s:'solo',v:1},{s:'guts',v:1}],
    result:`自分には関係のない温もりだ。\nそう思って、歩き続けた。`},
 ]},

{id:'butterfly',label:'── 蝶 ──',scene:'park_day',
 text:S=>`春の公園に、大きな蝶が飛んでいた。\nひらひらと、まるで${nm()}をからかうように。\n気づいたら前足が出ていた。`,
 choices:[
   {text:'全力で追いかける',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:1}],
    result:`蝶はひらりとかわし続けた。\nまったく捕まえられなかった。\nでも気持ちよかった。\n<span class="hl-gain">速さが上がった。</span>`},
   {text:'お座りして眺める',hints:[],
    deltas:[{s:'smt',v:1},{s:'solo',v:1},{s:'hp',v:1}],
    result:`蝶はやがて遠くへ飛んでいった。\nそれでいい、と思った。\n<span class="hl-gain">賢さが上がった。</span>`},
 ]},

{id:'memory_abandoned',label:'── 段ボールの夢 ──',scene:'alley_rain',
 text:S=>`雨の音で、${nm()}は夢を見た。\n産まれたばかりの、あの段ボール箱の夢だ。\n\n目が覚めると、同じような雨の夜だった。\n体の古い傷がじんわりと痛む。`,
 choices:[
   {text:'雨の中をあえて歩く',hints:[{t:'hp',s:'-'}],
    deltas:[{s:'guts',v:2},{s:'solo',v:1},{s:'hp',v:-1}],
    result:`ずぶ濡れになりながら、何かを確かめるように歩いた。\nここまで生き延びた。それだけは本当だ。\n<span class="hl-loss">体力が少し減ったが</span>、何か固まった。`},
   {text:'丸まって朝を待つ',hints:[{t:'hp',s:'+'}],
    deltas:[{s:'hp',v:3},{s:'kind',v:1}],
    result:`夢を思い出しながら、${nm()}は目を閉じた。\nあのとき誰かに助けてほしかった。\nだから自分は、今の自分でいるのかもしれない。\n<span class="hl-gain">体力が回復した。</span>`},
 ]},

{id:'sick_cat',label:'── 路地の片隅 ──',scene:'alley_day',
 text:S=>`路地の片隅で、痩せた猫が横たわっていた。\n病気なのか、老いているのか——\n立ち上がれない様子だ。`,
 choices:[
   {text:'傍に寄り添う',hints:[{t:'kind',s:'+'}],
    deltas:[{s:'kind',v:2},{s:'solo',v:-1},{s:'hp',v:-1}],
    result:`${nm()}は何もできなかった。\nただ、傍にいた。\nどれくらいそうしていたかわからない。\n<span class="hl-gain">優しさが上がった。</span>`},
   {text:'食べ物を持ってくる',hints:[{t:'kind',s:'+'},{t:'smt',s:'+'}],
    deltas:[{s:'kind',v:2},{s:'smt',v:1},{s:'hp',v:-2}],
    result:`自分の食べ物の半分を置いてきた。\n翌日、猫はいなかった。食べ物だけが残っていた。\n<span class="hl-gain">優しさと賢さが上がった。</span>`},
   {text:'目をそらして通り過ぎる',hints:[],
    deltas:[{s:'cruel',v:1},{s:'solo',v:1}],
    result:`見なかったことにした。\nでも、その猫の目が頭から離れなかった。`},
 ]},

// ── 新規若猫期イベント ──

{id:'ch2_alley_cat_gang',label:'── 路地の不良猫 ──',scene:'alley_night',
 text:S=>`夜の路地に3匹の猫がたむろしていた。\nこちらを見て、薄く笑っている。\n「新顔じゃないか」`,
 choices:[
   {text:'堂々と通り抜ける',hints:[{t:'mnc',s:'+'},{t:'pow',s:'+'}],
    deltas:S=>S.mnc>=4?[{s:'mnc',v:1},{s:'pow',v:1},{s:'guts',v:1}]:[{s:'mnc',v:1},{s:'hp',v:-2}],
    result:S=>S.mnc>=4
      ?`${nm()}の迫力に、3匹は道を開けた。\n一番大きい猫が「面白い奴だ」と言った。\n<span class="hl-gain">迫力とパワーが上がった。</span>`
      :`引っかかれた。でも倒れなかった。\n<span class="hl-loss">体力が少し減った。</span>`},
   {text:'愛嬌を振りまして仲間になる',hints:[{t:'chrm',s:'+'}],
    deltas:S=>rnd()<0.3+S.chrm*0.07?[{s:'chrm',v:1},{s:'kind',v:1},{s:'hp',v:2}]:[{s:'chrm',v:1}],
    result:S=>S.hp>7
      ?`${nm()}の愛嬌に3匹はほだされた。\nその夜、いい食べ物を分けてもらった。\n<span class="hl-gain">愛嬌が上がった！</span>`
      :`無視された。でも喧嘩にはならなかった。\n<span class="hl-gain">愛嬌が少し上がった。</span>`},
   {text:'別の道を探す',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1}],
    result:`無駄な争いは避けた。\n迂回路を覚えた。\n<span class="hl-gain">賢さが上がった。</span>`},
 ]},

{id:'ch2_rain_shelter',label:'── 雨宿り ──',scene:'alley_rain',
 text:S=>`急な雨。軒下に逃げ込むと、先に猫が一匹いた。\nお互い無言で、雨が止むのを待っている。`,
 choices:[
   {text:'話しかけてみる',hints:[{t:'chrm',s:'+'}],
    deltas:S=>rnd()<0.5+S.chrm*0.05?[{s:'chrm',v:1},{s:'kind',v:1},{s:'solo',v:-1},{s:'hp',v:2}]:[{s:'chrm',v:1},{s:'solo',v:-1}],
    result:S=>S.hp>7
      ?`相手は最初警戒していたが、やがて話してくれた。\n近くの食べ物のいい場所を教わった。\n<span class="hl-gain">愛嬌が上がり、体力も回復！</span>`
      :`相手は黙ったままだった。でも攻撃はしなかった。\n<span class="hl-gain">愛嬌が上がった。</span>`},
   {text:'距離を保ってじっとしている',hints:[],
    deltas:[{s:'smt',v:1},{s:'solo',v:1}],
    result:`雨は1時間後に止んだ。\n相手は何も言わずに去っていった。\n<span class="hl-gain">賢さが上がった。</span>`},
 ]},

{id:'ch2_park_fountain',label:'── 噴水の周り ──',scene:'park_day',
 text:S=>`公園の噴水の周りに人だかりができていた。\n子どもたちが水遊びをしている。\n${nm()}は遠くから眺めていた。`,
 choices:[
   {text:'水に近づいて顔を洗う',hints:[{t:'chrm',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'chrm',v:1},{s:'hp',v:3}],
    result:`冷たくて気持ちよかった。\n子どもに見つかって写真を撮られた。\n<span class="hl-gain">愛嬌が上がり、体力回復！</span>`},
   {text:'子どもたちを眺めてぼーっとする',hints:[],
    deltas:[{s:'smt',v:1},{s:'kind',v:1}],
    result:`無邪気に遊ぶ子どもたちを見ていると、\n不思議と気持ちが和んだ。\n<span class="hl-gain">賢さが上がった。</span>`},
   {text:'うっかり水に落ちる',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'chrm',v:1},{s:'hp',v:2}],
    result:`大きな水音。みんなが振り返った。\n必死に岸に上がると、周囲から笑いと拍手が起きた。\nなんとかなった。\n<span class="hl-gain">速さと愛嬌が上がった。</span>`},
 ]},

{id:'ch2_stray_dog',label:'── 迷い犬 ──',scene:'alley_day',
 text:S=>`首輪のついた大型犬が路地をうろついていた。\n迷子のようで、不安そうな目をしている。\nリードが切れて逃げてきたらしい。`,
 choices:[
   {text:'無視して遠回りする',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1}],
    result:`危険を避けた。賢い判断だった。\n<span class="hl-gain">賢さが上がった。</span>`},
   {text:'犬をよく観察する',hints:[{t:'smt',s:'+'},{t:'mnc',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'mnc',v:1}],
    result:`大きいが、弱っている。\nいざとなれば勝てると思った。\n犬の行動パターンを学んだ。\n<span class="hl-gain">賢さと迫力が上がった。</span>`},
   {text:'シャーッと威嚇して追い払う',hints:[{t:'mnc',s:'+'},{t:'pow',s:'+'}],
    deltas:S=>S.mnc>=4?[{s:'mnc',v:1},{s:'pow',v:1}]:[{s:'mnc',v:1},{s:'hp',v:-2}],
    result:S=>S.mnc>=4
      ?`犬は驚いて逃げ出した。\n${nm()}の迫力が犬を圧倒した。\n<span class="hl-gain">迫力とパワーが上がった！</span>`
      :`犬に吠え返されて逃げた。\n<span class="hl-loss">体力が少し減った。</span>`},
 ]},

{id:'ch2_shrine_festival',label:'── 縁日の夜 ──',scene:'shrine',
 text:S=>`神社で縁日が開かれていた。\nたこ焼き、焼きそば、金魚すくい。\n人だかりの中、食べ物のにおいが漂っている。`,
 choices:[
   {text:'出店の隙間を縫って食べ物を漁る',hints:[{t:'spd',s:'+'},{t:'smt',s:'+'}],
    deltas:S=>S.spd>=4?[{s:'spd',v:1},{s:'smt',v:1},{s:'hp',v:4}]:[{s:'spd',v:1},{s:'hp',v:1}],
    result:S=>S.spd>=4
      ?`人込みを素早く抜け、たこ焼きのかけらをゲットした。\n<span class="hl-gain">速さと賢さが上がり、体力回復！</span>`
      :`人に踏まれそうになりながらも、少しだけもらえた。\n<span class="hl-gain">速さが上がった。</span>`},
   {text:'子どもに愛嬌を振りまく',hints:[{t:'chrm',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'chrm',v:2},{s:'kind',v:1},{s:'hp',v:4}],
    result:`子どもたちが「かわいい！」と集まってきた。\nいろんなものをもらった。\n<span class="hl-strong">愛嬌が大きく上がり、体力回復！</span>`},
   {text:'騒がしいので遠くから見るだけ',hints:[],
    deltas:[{s:'smt',v:1},{s:'solo',v:1}],
    result:`祭りは遠くから見る方が好きだ、と思った。\n<span class="hl-gain">賢さが上がった。</span>`},
 ]},

{id:'ch2_cold_snap',label:'── 木枯らし ──',scene:'alley_night',
 text:S=>`急に寒くなった夜。\n体の芯まで冷えてくる。\n近くのコンビニから温かい空気が漏れている。`,
 choices:[
   {text:'コンビニの入口で温まる',hints:[{t:'chrm',s:'+'},{t:'hp',s:'+'}],
    deltas:S=>rnd()<0.4+S.chrm*0.06?[{s:'chrm',v:1},{s:'hp',v:4}]:[{s:'chrm',v:1},{s:'hp',v:2}],
    result:S=>S.hp>7
      ?`店員が缶詰を開けてくれた。\n温かくて美味しかった。\n<span class="hl-gain">愛嬌が上がり、たっぷり体力回復！</span>`
      :`しばらく温まれた。\n<span class="hl-gain">愛嬌が少し上がった。体力も少し回復。</span>`},
   {text:'走り回って体を温める',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'guts',v:1}],
    result:`走ったら確かに温まった。\n体力も使ったが、気持ちよかった。\n<span class="hl-gain">速さが上がった。</span>`},
   {text:'他の猫を探して寄り添う',hints:[{t:'kind',s:'+'}],
    deltas:[{s:'kind',v:1},{s:'chrm',v:1},{s:'solo',v:-1},{s:'hp',v:3}],
    result:`橋の下に2匹いた。\n三匹で丸まって夜を越えた。\n温もりがあった。\n<span class="hl-gain">優しさと愛嬌が上がり、体力回復！</span>`},
 ]},

{id:'ch2_fishing_spot',label:'── 釣り人 ──',scene:'river',
 text:S=>`川沿いに老人が釣りをしていた。\nバケツの中に魚が何匹か見える。\n老人は${nm()}に気づいたが、追い払わない。`,
 choices:[
   {text:'じっと見つめてねだる',hints:[{t:'chrm',s:'+'},{t:'hp',s:'+'}],
    deltas:S=>rnd()<0.5+S.chrm*0.06?[{s:'chrm',v:1},{s:'hp',v:4},{s:'kind',v:1}]:[{s:'chrm',v:1}],
    result:S=>S.hp>7
      ?`老人は苦笑いして、釣れた小魚を一匹くれた。\n「毎日来てもいいぞ」と言った。\n<span class="hl-gain">愛嬌が上がり、体力回復！</span>`
      :`老人は無視して釣りを続けた。\n<span class="hl-gain">愛嬌だけが上がった。</span>`},
   {text:'川に飛び込んで自力で魚を取る',hints:[{t:'pow',s:'+'},{t:'spd',s:'+'}],
    deltas:S=>S.spd>=4?[{s:'pow',v:1},{s:'spd',v:1},{s:'hp',v:3}]:[{s:'pow',v:1},{s:'hp',v:-1}],
    result:S=>S.spd>=4
      ?`冷たい水に飛び込み、素早く魚を掴んだ。\n老人が目を丸くしていた。\n<span class="hl-gain">パワーと速さが上がり、体力回復！</span>`
      :`水に入ったが魚は逃げた。\nびしょ濡れで帰った。\n<span class="hl-gain">パワーが上がった。</span>`},
 ]},

{id:'ch2_rooftop_wind',label:'── 風の吹く屋上 ──',scene:'rooftop',
 text:S=>`ビルの屋上に登った。\n風が強い。街が遠くまで見える。\n${nm()}は目を細めて、地平線を見た。`,
 choices:[
   {text:'思いきり鳴いてみる',hints:[{t:'mnc',s:'+'}],
    deltas:[{s:'mnc',v:1},{s:'guts',v:1}],
    result:`声は風に乗って、街へと広がった。\nここにいる、という宣言だった。\n<span class="hl-gain">迫力が上がった。</span>`},
   {text:'街の地理を把握する',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:2}],
    result:`食べ物の多い場所、危険な場所。\n高い場所から見ると、全部わかった。\n<span class="hl-strong">賢さが大きく上がった！</span>`},
   {text:'昼寝する',hints:[{t:'hp',s:'+'}],
    deltas:[{s:'hp',v:4},{s:'solo',v:1}],
    result:`風は気持ちよかった。\nすっかり寝てしまった。\n<span class="hl-gain">体力が大幅回復した。</span>`},
 ]},

{id:'ch2_old_couple',label:'── 老夫婦の庭 ──',scene:'alley_day',
 text:S=>`塀の向こうから、花のにおいがした。\n庭で老夫婦が花壇の手入れをしている。\n隙間から覗くと、ふたりに気づかれた。`,
 choices:[
   {text:'ニャアと鳴く',hints:[{t:'chrm',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'chrm',v:2},{s:'kind',v:1},{s:'hp',v:5}],
    result:`おばあさんが「まあ！」と声を上げた。\nおじいさんが缶詰を買いに行ってくれた。\nしばらく庭に置いてもらった。\n<span class="hl-strong">愛嬌が大きく上がり、たっぷり体力回復！</span>`},
   {text:'そっと立ち去る',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'solo',v:1}],
    result:`関わりたくなかった。\n後ろから「あら、いっちゃった」と声が聞こえた。\n<span class="hl-gain">速さが上がった。</span>`},
 ]},

{id:'ch2_street_performer',label:'── 大道芸人 ──',scene:'park_day',
 text:S=>`公園で大道芸人が火を使ったジャグリングをしていた。\n人だかりの真ん中に、${nm()}が迷い込んだ。`,
 choices:[
   {text:'演技のど真ん中を堂々と歩く',hints:[{t:'mnc',s:'+'},{t:'chrm',s:'+'}],
    deltas:[{s:'mnc',v:1},{s:'chrm',v:2},{s:'hp',v:2}],
    result:`観客がどよめいた。\n大道芸人が即興で${nm()}を演技に組み込んだ。\n大喝采。誰かがご飯をくれた。\n<span class="hl-strong">迫力と愛嬌が上がった！体力回復！</span>`},
   {text:'火が怖くて逃げ出す',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:1}],
    result:`猛ダッシュで人込みを抜けた。\nひとりの子どもが笑っていた。\n<span class="hl-gain">速さが上がった。</span>`},
 ]},

{id:'ch2_abandoned_house',label:'── 廃屋 ──',scene:'alley_night',
 text:S=>`誰も住んでいない古い家を見つけた。\n窓が割れていて、中に入れそうだ。\n暗くて静かで、少し不気味だ。`,
 choices:[
   {text:'探索してみる',hints:[{t:'smt',s:'+'},{t:'pow',s:'+'}],
    deltas:S=>rnd()<0.5?[{s:'smt',v:1},{s:'pow',v:1},{s:'maxhp',v:1},{s:'hp',v:2}]:[{s:'smt',v:1},{s:'hp',v:-1}],
    result:S=>S.hp>7
      ?`中にネズミがいた。仕留めた。\nそれ以来、ここは${nm()}の秘密基地になった。\n<span class="hl-gain">賢さとパワーが上がり、最大体力まで増えた！</span>`
      :`足を滑らせて怪我をした。\n急いで逃げ出した。\n<span class="hl-gain">賢さは上がった。</span>`},
   {text:'外から様子を見るだけにする',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'solo',v:1}],
    result:`無理に入る必要はない。\n場所だけ覚えておいた。\n<span class="hl-gain">賢さが上がった。</span>`},
 ]},

{id:'ch2_pigeons',label:'── 鳩の群れ ──',scene:'park_day',
 text:S=>`広場に鳩が50羽以上集まっていた。\nおじいさんがパンくずを撒いている。\n${nm()}の目がキラリと光った。`,
 choices:[
   {text:'群れに突撃する',hints:[{t:'spd',s:'+'},{t:'pow',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'pow',v:1},{s:'cruel',v:1},{s:'hp',v:2}],
    result:`鳩たちが一斉に飛び立った。\n大迫力だった。\nパンくずはいくつかゲットできた。\n<span class="hl-gain">速さとパワーが上がった！</span>`},
   {text:'パンくずを狙って慎重に近づく',hints:[{t:'smt',s:'+'},{t:'spd',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'spd',v:1},{s:'hp',v:3}],
    result:`鳩に気づかれないよう、じりじりと近づいた。\nうまくパンくずをいくつかもらえた。\n<span class="hl-gain">賢さと速さが上がり、体力回復！</span>`},
   {text:'おじいさんに愛嬌を振りまく',hints:[{t:'chrm',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'chrm',v:1},{s:'hp',v:4},{s:'kind',v:1}],
    result:`おじいさんは鳩より${nm()}が気に入ったようで、\nパンを大量にくれた。\n<span class="hl-gain">愛嬌が上がり、体力大幅回復！</span>`},
 ]},

{id:'ch2_river_fish',label:'── 川の魚 ──',scene:'river',
 text:S=>`川沿いを歩いていると、浅瀬に魚が見えた。\n手が届きそうな場所でひらひらしている。`,
 choices:[
   {text:'飛び込んで捕まえる',hints:[{t:'spd',s:'+'},{t:'pow',s:'+'}],
    deltas:S=>S.spd>=4?[{s:'spd',v:1},{s:'pow',v:1},{s:'hp',v:5}]:[{s:'pow',v:1},{s:'hp',v:1}],
    result:S=>S.spd>=4
      ?`一瞬で水に飛び込み、魚を掴んだ。\nびしょ濡れだが、満足だった。\n<span class="hl-strong">速さとパワーが上がり、たっぷり体力回復！</span>`
      :`魚は逃げてしまった。\nでも川の中での動き方を学んだ。\n<span class="hl-gain">パワーが上がった。</span>`},
   {text:'前足でそっと狙いを定める',hints:[{t:'smt',s:'+'}],
    deltas:S=>rnd()<0.4+S.smt*0.05?[{s:'smt',v:1},{s:'hp',v:4}]:[{s:'smt',v:1}],
    result:S=>S.hp>7
      ?`静かに狙いを定めて、一撃で仕留めた。\n<span class="hl-gain">賢さが上がり、体力回復！</span>`
      :`魚は逃げた。でも技術は身についた。\n<span class="hl-gain">賢さが上がった。</span>`},
 ]},
],

// ══════════════════════════ CH3: 後半の試練（18本）══════════════════════════
[
{id:'pack_encounter',label:'── 港の群れ ──',scene:'harbor',
 text:S=>`港の倉庫街。5匹ほどの群れが縄張りを持っている。\nここには食べ物が豊富だ。\nリーダー格の猫が近づいてきた。\n\n総合力：${S.spd+S.pow+S.smt+S.chrm+S.mnc}`,
 choices:[
   {text:'群れに入れてほしいと頭を下げる',hints:[{t:'chrm',s:'+'},{t:'smt',s:'+'}],
    deltas:S=>S.chrm>=6?[{s:'smt',v:1},{s:'chrm',v:2},{s:'kind',v:1},{s:'hp',v:4}]:[{s:'smt',v:1},{s:'chrm',v:1},{s:'hp',v:-1}],
    result:S=>S.chrm>=6
      ?`リーダーは少し考えてから、仲間を紹介してくれた。\n食べ物を分けてもらった。\n<span class="hl-strong">愛嬌が大きく上がった！体力も回復！</span>`
      :`断られた。プライドが傷ついたが、無駄な戦いは避けられた。\n<span class="hl-gain">賢さが上がった。</span>`},
   {text:'リーダーに一対一の決闘を申し込む',hints:[{t:'pow',s:'+'},{t:'mnc',s:'+'}],
    deltas:S=>S.pow+S.mnc>=10?[{s:'pow',v:2},{s:'mnc',v:2},{s:'guts',v:1},{s:'hp',v:-3}]:[{s:'hp',v:-6},{s:'guts',v:1}],
    result:S=>S.pow+S.mnc>=10
      ?`激戦だった。全身傷だらけになりながらも、リーダーを打ち負かした。\n群れ全員が${nm()}を認めた。\n<span class="hl-strong">パワーと迫力が大きく上がった！</span>`
      :`相手の経験と実力が上だった。ボロボロになって逃げた。\n<span class="hl-loss">体力が大幅に減った。</span>`},
   {text:'知らないふりで堂々と通り抜ける',hints:[{t:'mnc',s:'+'},{t:'spd',s:'+'}],
    deltas:[{s:'mnc',v:1},{s:'spd',v:1}],
    result:`堂々と無視したら、相手の方が戸惑っていた。\n<span class="hl-gain">迫力と速さが上がった。</span>`},
 ]},

{id:'winter_cold',label:'── 厳冬の夜 ──',scene:'snowfield',
 text:S=>`雪が降り始めた。気温は氷点下。\n体の芯から冷えてくる。\nこのままでは凍えてしまいそうだ。`,
 choices:[
   {text:'民家の軒下に忍び込む',hints:[{t:'smt',s:'+'},{t:'hp',s:'+'}],
    deltas:S=>S.smt>=6?[{s:'smt',v:1},{s:'hp',v:5}]:[{s:'smt',v:1},{s:'hp',v:2}],
    result:S=>S.smt>=6
      ?`人間に気づかれず、暖かい場所で夜を越えた。\n<span class="hl-strong">賢さが上がり、たっぷり体力回復！</span>`
      :`住人に見つかって追い払われた。\nでも少しは暖まれた。<span class="hl-gain">賢さが上がった。</span>`},
   {text:'他の野良猫たちと寄り添う',hints:[{t:'chrm',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'chrm',v:1},{s:'kind',v:1},{s:'hp',v:3}],
    result:`見知らぬ猫たちと体を寄せ合って夜を越えた。\n温もりがあった。\n<span class="hl-gain">愛嬌が上がり、体力も回復。</span>`},
   {text:'一人で気合いで乗り越える',hints:[{t:'hp',s:'-'}],
    deltas:S=>S.guts>=6?[{s:'guts',v:2},{s:'maxhp',v:1},{s:'hp',v:-2}]:[{s:'guts',v:2},{s:'hp',v:-4}],
    result:S=>S.guts>=6
      ?`歯を食いしばって夜明けを待った。\n根性が体を強くした。\n<span class="hl-strong">最大体力が増えた！</span>`
      :`全身の毛が霜で白くなっていた。ギリギリ生き延びた。\n<span class="hl-loss">体力は大幅に減った。</span>`},
 ]},

{id:'mate_season',label:'── 恋の季節 ──',scene:'park_night',
 text:S=>`春の夜、近所の猫の鳴き声が響いている。\nライバルの猫が先にそちらへ向かっている。\n\n愛嬌：${S.chrm}　パワー：${S.pow}　迫力：${S.mnc}`,
 choices:[
   {text:'全力で割り込んで勝負する',hints:[{t:'pow',s:'+'},{t:'mnc',s:'+'}],
    deltas:S=>S.pow+S.mnc>=9?[{s:'pow',v:1},{s:'mnc',v:1},{s:'guts',v:1},{s:'hp',v:-2}]:[{s:'hp',v:-4},{s:'guts',v:1}],
    result:S=>S.pow+S.mnc>=9
      ?`ライバルを圧倒した。この夜の主役になった。\n<span class="hl-strong">パワーと迫力が上がった！</span>`
      :`ライバルに完敗した。傷だらけで帰った。\n<span class="hl-loss">体力が大幅に減った。</span>`},
   {text:'愛嬌を振りまいてアピールする',hints:[{t:'chrm',s:'+'}],
    deltas:S=>S.chrm>=6?[{s:'chrm',v:2},{s:'kind',v:1},{s:'hp',v:2}]:[{s:'chrm',v:1}],
    result:S=>S.chrm>=6
      ?`ライバルよりも可愛げが勝った。\n<span class="hl-strong">愛嬌が大きく上がった！</span>`
      :`ライバルの方が選ばれた。でも愛嬌は磨かれた。\n<span class="hl-gain">愛嬌が上がった。</span>`},
   {text:'冷静に引き下がる',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'hp',v:2}],
    result:`今は実力をつける時、と判断した。\n傷を負わずに済んだ。<span class="hl-gain">賢さが上がった。</span>`},
 ]},

{id:'territory_war',label:'── 大きな縄張り戦争 ──',scene:'harbor',
 text:S=>`港の群れと、駅前の群れが衝突した。\n${nm()}はその中心にいる。\nどちらにつくか、それとも——\n\nパワー＋迫力：${S.pow+S.mnc}`,
 choices:[
   {text:'強い側についてともに戦う',hints:[{t:'pow',s:'+'},{t:'mnc',s:'+'}],
    deltas:S=>S.pow+S.mnc>=10?[{s:'pow',v:2},{s:'mnc',v:1},{s:'guts',v:1},{s:'hp',v:-3},{s:'cruel',v:1}]:[{s:'pow',v:1},{s:'hp',v:-5},{s:'guts',v:1}],
    result:S=>S.pow+S.mnc>=10
      ?`戦いの中で、${nm()}は誰よりも輝いていた。\n両群れが${nm()}を恐れた。\n<span class="hl-strong">パワーと迫力が大きく上がった！</span>`
      :`激しい戦いで深手を負った。\n<span class="hl-loss">体力が大幅に減った。</span>`},
   {text:'両者の間に割って入り仲裁する',hints:[{t:'mnc',s:'+'},{t:'chrm',s:'+'},{t:'smt',s:'+'}],
    deltas:S=>S.mnc+S.chrm>=8?[{s:'mnc',v:1},{s:'chrm',v:1},{s:'smt',v:1},{s:'kind',v:1}]:[{s:'smt',v:1},{s:'hp',v:-2}],
    result:S=>S.mnc+S.chrm>=8
      ?`${nm()}の迫力と愛嬌が、双方を圧倒した。\n不思議と、争いが止んだ。\n<span class="hl-strong">迫力・愛嬌・賢さが上がった！</span>`
      :`両方から攻撃を受けた。\n<span class="hl-loss">体力が減った。</span>でも賢さが身についた。`},
   {text:'素早く逃げて傷つかないようにする',hints:[{t:'spd',s:'+'},{t:'smt',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'smt',v:1},{s:'hp',v:2}],
    result:`戦場を素早く離脱した。\n無駄な傷を負わないことも強さだ。\n<span class="hl-gain">速さと賢さが上がった。</span>`},
 ]},

{id:'rooftop_night',label:'── 屋根の上の孤独 ──',scene:'rooftop',
 text:S=>`ある夜、高いビルの屋上に登った。\n街の灯りが広がっている。\nここまでの日々が、走馬灯のように思い出された。\n\nひとつ、深呼吸をした。`,
 choices:[
   {text:'もっと遠くへ行こうと決意する',hints:[{t:'spd',s:'+'},{t:'smt',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'guts',v:1},{s:'smt',v:1}],
    result:`この街の向こうに何があるのか。\n${nm()}は遠い地平線を見つめた。\n<span class="hl-gain">速さと賢さが上がった。</span>`},
   {text:'この街を守ろうと決意する',hints:[{t:'mnc',s:'+'},{t:'pow',s:'+'}],
    deltas:[{s:'mnc',v:1},{s:'pow',v:1},{s:'guts',v:1}],
    result:`この街の空気、この街の匂い。\n守るべきものが見えた気がした。\n<span class="hl-gain">迫力とパワーが上がった。</span>`},
   {text:'誰かと一緒にいたいと思う',hints:[{t:'chrm',s:'+'}],
    deltas:[{s:'chrm',v:1},{s:'kind',v:2},{s:'hp',v:2}],
    result:`強さだけじゃない。温もりが欲しかった。\n<span class="hl-gain">愛嬌が上がった。</span>`},
 ]},

// ── 新規後半イベント ──

{id:'ch3_legend_cat',label:'── 伝説の野良 ──',scene:'alley_night',
 text:S=>`夜の路地に、白い毛並みの古い猫がいた。\n他の猫たちが「伝説の野良」と呼ぶ猫だ。\nこの街で20年生きている、という噂だ。\n\n総合力：${S.spd+S.pow+S.smt+S.chrm+S.mnc}`,
 choices:[
   {text:'教えを乞う',hints:[{t:'smt',s:'+'},{t:'mnc',s:'+'}],
    deltas:S=>S.smt>=6?[{s:'smt',v:2},{s:'mnc',v:1},{s:'maxhp',v:2}]:[{s:'smt',v:1},{s:'mnc',v:1}],
    result:S=>S.smt>=6
      ?`白い猫はゆっくり話してくれた。\n生き抜くための深い知恵を学んだ。\n<span class="hl-strong">賢さが大きく上がり、最大体力も増えた！</span>`
      :`白い猫は黙って${nm()}を見ていた。\n何かを伝えようとしていたが、${nm()}には受け取れなかった。\n<span class="hl-gain">賢さと迫力が上がった。</span>`},
   {text:'力を認めてもらおうと挑む',hints:[{t:'pow',s:'+'},{t:'guts',s:'+'}],
    deltas:S=>S.pow>=8?[{s:'pow',v:2},{s:'guts',v:1},{s:'mnc',v:1}]:[{s:'guts',v:1},{s:'hp',v:-3}],
    result:S=>S.pow>=8
      ?`互角の勝負だった。\n白い猫は静かに笑った。「やるな」\n<span class="hl-strong">パワーが大きく上がった！</span>`
      :`相手にならなかった。20年の重みは伊達ではなかった。\n<span class="hl-loss">体力が減ったが</span>、根性がついた。`},
 ]},

{id:'ch3_town_disaster',label:'── 街の大事件 ──',scene:'alley_day',
 text:S=>`街に消防車が来た。どこかで火事らしい。\n野良猫たちが騒ぎを見て慌てふためいている。\n${nm()}はその混乱の中心にいた。`,
 choices:[
   {text:'率先して逃げ道を示す',hints:[{t:'smt',s:'+'},{t:'chrm',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'chrm',v:1},{s:'kind',v:1},{s:'mnc',v:1}],
    result:`${nm()}の落ち着いた行動で、数匹の猫が安全に逃げられた。\n自然と周囲が従った。\n<span class="hl-gain">賢さと愛嬌と迫力が上がった！</span>`},
   {text:'自分だけ素早く避難する',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'cruel',v:1}],
    result:`他の猫より先に安全な場所へ移動した。\n<span class="hl-gain">速さが上がった。</span>`},
   {text:'混乱に乗じて食べ物を漁る',hints:[{t:'spd',s:'+'},{t:'smt',s:'+'}],
    deltas:S=>rnd()<0.5?[{s:'spd',v:1},{s:'smt',v:1},{s:'cruel',v:1},{s:'hp',v:4}]:[{s:'spd',v:1},{s:'cruel',v:1},{s:'hp',v:-2}],
    result:S=>S.hp>7
      ?`混乱の中、誰も見ていない場所に食べ物を見つけた。\n<span class="hl-gain">速さと賢さが上がり、体力回復！</span>`
      :`炎に近づきすぎて毛が焦げた。\n<span class="hl-loss">体力が減った。</span>`},
 ]},

{id:'ch3_harbor_night',label:'── 港の夜 ──',scene:'harbor',
 text:S=>`深夜の港。船から魚のコンテナが運ばれている。\n警備員がいるが、交代の隙間が見える。\n\n賢さ：${S.smt}　速さ：${S.spd}`,
 choices:[
   {text:'隙間を計算して潜入する',hints:[{t:'smt',s:'+'},{t:'spd',s:'+'}],
    deltas:S=>S.smt+S.spd>=10?[{s:'smt',v:1},{s:'spd',v:1},{s:'maxhp',v:1},{s:'hp',v:6}]:[{s:'smt',v:1},{s:'hp',v:2}],
    result:S=>S.smt+S.spd>=10
      ?`完璧なタイミングで潜入し、新鮮な魚をたっぷり食べた。\n警備員には気づかれなかった。\n<span class="hl-strong">賢さと速さが上がり、最大体力まで増えた！</span>`
      :`警備員に見つかりそうになって逃げた。\n少しだけ食べられた。<span class="hl-gain">賢さが上がった。</span>`},
   {text:'港の猫たちに仲間入りをお願いする',hints:[{t:'chrm',s:'+'},{t:'hp',s:'+'}],
    deltas:S=>S.chrm>=6?[{s:'chrm',v:1},{s:'kind',v:1},{s:'hp',v:5}]:[{s:'chrm',v:1},{s:'hp',v:1}],
    result:S=>S.chrm>=6
      ?`港の猫たちは${nm()}を気に入り、いい場所を案内してくれた。\n<span class="hl-gain">愛嬌が上がり、体力大幅回復！</span>`
      :`警戒された。でも追い払われはしなかった。\n<span class="hl-gain">愛嬌が上がった。</span>`},
 ]},

{id:'ch3_rainy_season',label:'── 梅雨の長雨 ──',scene:'alley_rain',
 text:S=>`一週間、雨が降り続いた。\n食べ物を探すのも一苦労だ。\n体力が少しずつ削られていく。`,
 choices:[
   {text:'雨の中でも毎日探し続ける',hints:[{t:'guts',s:'+'},{t:'hp',s:'-'}],
    deltas:[{s:'guts',v:2},{s:'pow',v:1},{s:'hp',v:-2}],
    result:`雨は嫌いだが、負けなかった。\n<span class="hl-loss">体力が減ったが</span>、<span class="hl-gain">根性とパワーが上がった。</span>`},
   {text:'雨宿りができる安全な場所を確保する',hints:[{t:'smt',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'smt',v:2},{s:'hp',v:3}],
    result:`駐車場の隅に完璧な雨宿り場所を見つけた。\n安定した一週間になった。\n<span class="hl-strong">賢さが大きく上がり、体力回復！</span>`},
   {text:'人間に助けを求める',hints:[{t:'chrm',s:'+'},{t:'hp',s:'+'}],
    deltas:S=>rnd()<0.4+S.chrm*0.06?[{s:'chrm',v:1},{s:'hp',v:5},{s:'kind',v:1}]:[{s:'chrm',v:1},{s:'hp',v:-1}],
    result:S=>S.hp>7
      ?`動物病院の前で鳴いていたら、保護されて一週間泊まれた。\n<span class="hl-strong">愛嬌が上がり、たっぷり体力回復！</span>`
      :`人間は素通りしていった。\n<span class="hl-gain">愛嬌だけが上がった。</span>`},
 ]},

{id:'ch3_cat_cafe_escape',label:'── 猫カフェからの脱走猫 ──',scene:'alley_day',
 text:S=>`おびえた顔の猫が走ってきた。\n首輪がついている。\nどうやら猫カフェから逃げ出してきたらしい。`,
 choices:[
   {text:'安全な場所に連れて行く',hints:[{t:'kind',s:'+'},{t:'chrm',s:'+'}],
    deltas:[{s:'kind',v:2},{s:'chrm',v:1},{s:'solo',v:-1}],
    result:`その猫は怖がっていたが、${nm()}についてきた。\n翌日、飼い主が探しに来て、再会を果たした。\n<span class="hl-gain">優しさと愛嬌が上がった。</span>`},
   {text:'自由の生き方を教えてやる',hints:[{t:'mnc',s:'+'},{t:'solo',s:'+'}],
    deltas:[{s:'mnc',v:1},{s:'solo',v:1},{s:'cruel',v:1}],
    result:`「お前は今日から野良だ」と言い聞かせた。\nその猫が本当に喜んでいたかはわからない。\n<span class="hl-gain">迫力が上がった。</span>`},
   {text:'関係ないと立ち去る',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'solo',v:1}],
    result:`他の猫の事情に関わる必要はない。\n<span class="hl-gain">速さが上がった。</span>`},
 ]},

{id:'ch3_human_grief',label:'── 泣いている人 ──',scene:'river',
 text:S=>`川沿いのベンチに、若い女性が一人で泣いていた。\n夜遅い。誰もいない。\n${nm()}は何となく、足が止まった。`,
 choices:[
   {text:'そっと隣に座る',hints:[{t:'kind',s:'+'},{t:'chrm',s:'+'}],
    deltas:[{s:'kind',v:2},{s:'chrm',v:1},{s:'solo',v:-1},{s:'hp',v:3}],
    result:`女性は驚いて、それから少し笑った。\nしばらく頭を撫でてもらった。\nなんだか温かかった。\n<span class="hl-gain">優しさと愛嬌が上がり、体力回復。</span>`},
   {text:'見なかったことにする',hints:[{t:'solo',s:'+'}],
    deltas:[{s:'solo',v:1},{s:'cruel',v:1}],
    result:`野良猫に人間の悲しみは関係ない。\nそう思うことにした。\nでも、しばらく気になっていた。`},
 ]},

{id:'ch3_street_cat_duel',label:'── 街最強決定戦 ──',scene:'wasteland',
 text:S=>`街外れの空き地に、各地の強い猫が集まっていた。\n誰が言い出したのか、「街一番」を決める戦いが始まろうとしている。\n\nパワー：${S.pow}　迫力：${S.mnc}　速さ：${S.spd}`,
 choices:[
   {text:'参加して戦う',hints:[{t:'pow',s:'+'},{t:'mnc',s:'+'}],
    deltas:S=>S.pow+S.mnc+S.spd>=18?[{s:'pow',v:2},{s:'mnc',v:2},{s:'maxhp',v:2},{s:'hp',v:-3}]:[{s:'pow',v:1},{s:'mnc',v:1},{s:'hp',v:-5}],
    result:S=>S.pow+S.mnc+S.spd>=18
      ?`全員を倒した。\n「街最強」の座を手にした。\n<span class="hl-strong">パワーと迫力が大きく上がった！最大体力も増えた！</span>`
      :`強敵に負けた。でも最後まで戦った。\n<span class="hl-loss">体力が大幅に減った。</span>`},
   {text:'観戦して強敵の弱点を分析する',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:2},{s:'mnc',v:1}],
    result:`戦いを見て、各猫の動き方を分析した。\n次に戦うときに活かせる。\n<span class="hl-strong">賢さが大きく上がり、迫力も上昇！</span>`},
   {text:'こっそり食べ物を漁る',hints:[{t:'spd',s:'+'},{t:'smt',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'smt',v:1},{s:'hp',v:4}],
    result:`みんなが戦いに夢中な間に、持ち寄った食べ物をいただいた。\n<span class="hl-gain">速さと賢さが上がり、体力回復！</span>`},
 ]},

{id:'ch3_snow_night',label:'── 雪の夜 ──',scene:'snowfield',
 text:S=>`初雪が降った。\n足跡が雪の上に残る。\n${nm()}は自分の足跡を振り返って見た。\nここまで歩いてきた道だ。`,
 choices:[
   {text:'足跡を辿って来た道を振り返る',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'guts',v:1}],
    result:`いろんなことがあった。\nでも全部、自分の足跡だ。\n<span class="hl-gain">賢さが上がった。</span>`},
   {text:'雪の中を思いきり走り回る',hints:[{t:'spd',s:'+'},{t:'pow',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'pow',v:1},{s:'hp',v:-1}],
    result:`雪は踏むと気持ちいい。\n走り回って遊んだ。\n少し体が冷えたが、楽しかった。\n<span class="hl-gain">速さとパワーが上がった。</span>`},
   {text:'雪だるまを崩す',hints:[{t:'pow',s:'+'}],
    deltas:[{s:'pow',v:1}],
    result:`誰かが作った雪だるまを崩した。\nなぜか気持ちよかった。\n<span class="hl-gain">パワーが上がった。</span>`},
 ]},

{id:'ch3_autumn_wind',label:'── 秋風の縁側 ──',scene:'shrine',
 text:S=>`神社の縁側に腰掛けた老僧がいた。\nお茶を飲みながら、境内の落ち葉を眺めている。\n${nm()}に気づいて、静かに微笑んだ。`,
 choices:[
   {text:'隣に座る',hints:[{t:'chrm',s:'+'},{t:'kind',s:'+'}],
    deltas:[{s:'chrm',v:1},{s:'kind',v:1},{s:'hp',v:3},{s:'solo',v:-1}],
    result:`老僧はお茶の湯気に${nm()}を当ててくれた。\nあたたかかった。\nしばらく、ふたりで秋の景色を眺めた。\n<span class="hl-gain">愛嬌と優しさが上がり、体力回復。</span>`},
   {text:'落ち葉で遊ぶ',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:1}],
    result:`くるくる舞う落ち葉を追いかけた。\n老僧は静かに笑っていた。\n<span class="hl-gain">速さが上がった。</span>`},
   {text:'境内を見て回る',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'solo',v:1}],
    result:`境内の隅々まで歩いた。\n古い石段の下に、安全な隠れ場所を見つけた。\n<span class="hl-gain">賢さが上がった。</span>`},
 ]},

{id:'ch3_midnight_run',label:'── 深夜の疾走 ──',scene:'alley_night',
 text:S=>`深夜、誰もいない街を走った。\n理由はない。ただ走りたかった。\n街灯の光の中を、${nm()}の影が伸びる。\n\n速さ：${S.spd}`,
 choices:[
   {text:'全力で走り続ける',hints:[{t:'spd',s:'+'}],
    deltas:S=>S.spd>=7?[{s:'spd',v:2},{s:'guts',v:1},{s:'solo',v:1}]:[{s:'spd',v:1},{s:'guts',v:1}],
    result:S=>S.spd>=7
      ?`風になった。\nこの街のどこへでも行けると思った。\n<span class="hl-strong">速さが大きく上がった！</span>`
      :`夜明けまで走った。\n朝日が出たとき、体が軽かった。\n<span class="hl-gain">速さが上がった。</span>`},
   {text:'いつもと違う路地を探索する',hints:[{t:'smt',s:'+'},{t:'spd',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'spd',v:1},{s:'hp',v:2}],
    result:`知らない路地に、いい食べ物の場所を見つけた。\n<span class="hl-gain">賢さと速さが上がり、体力も回復！</span>`},
 ]},

{id:'ch3_museum_cat',label:'── 美術館の前 ──',scene:'alley_day',
 text:S=>`美術館の前で、外国人観光客が${nm()}を見つけた。\n「スゴイネコダ！」と騒ぎ始めた。`,
 choices:[
   {text:'ポーズをとってやる',hints:[{t:'chrm',s:'+'}],
    deltas:[{s:'chrm',v:2},{s:'hp',v:3}],
    result:`写真を何十枚も撮られた。\nお土産のお菓子をもらった。\n<span class="hl-strong">愛嬌が大きく上がり、体力回復！</span>`},
   {text:'無視して去る',hints:[{t:'mnc',s:'+'}],
    deltas:[{s:'mnc',v:1},{s:'solo',v:1}],
    result:`観光客は残念そうだったが、${nm()}は気にしなかった。\n<span class="hl-gain">迫力が上がった。</span>`},
 ]},

{id:'ch3_late_night_ramen',label:'── 深夜のラーメン屋 ──',scene:'alley_night',
 text:S=>`深夜のラーメン屋から、豚骨のいいにおいがする。\n店の外に酔っ払いのサラリーマンが座って泣いている。\n足元においしそうなチャーシューが落ちている。`,
 choices:[
   {text:'チャーシューをそっといただく',hints:[{t:'spd',s:'+'},{t:'smt',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'smt',v:1},{s:'hp',v:3}],
    result:`男性は気づかなかった。\nチャーシューは美味しかった。\n<span class="hl-gain">速さと賢さが上がり、体力回復！</span>`},
   {text:'男性の膝の上に乗る',hints:[{t:'chrm',s:'+'},{t:'kind',s:'+'}],
    deltas:[{s:'chrm',v:1},{s:'kind',v:1},{s:'hp',v:4},{s:'solo',v:-1}],
    result:`男性は「ありがとうよ」と言って、ラーメンを一杯おごってくれた。\n深夜の不思議な出会いだった。\n<span class="hl-gain">愛嬌と優しさが上がり、体力大幅回復！</span>`},
   {text:'男性を威嚇してチャーシューを奪う',hints:[{t:'mnc',s:'+'},{t:'pow',s:'+'}],
    deltas:[{s:'mnc',v:1},{s:'pow',v:1},{s:'cruel',v:1},{s:'hp',v:2}],
    result:`男性は「うわ！」と言って逃げた。\nチャーシューは手に入った。\n<span class="hl-gain">迫力とパワーが上がった。</span>`},
 ]},

{id:'ch3_cat_colony_visit',label:'── 猫のコロニー ──',scene:'harbor',
 text:S=>`港の外れに、10匹以上の猫が暮らすコロニーがあった。\nそこには独自のルールがあるらしい。\n入口に立つと、古参の猫が${nm()}を見た。`,
 choices:[
   {text:'ルールに従って入る',hints:[{t:'smt',s:'+'},{t:'chrm',s:'+'}],
    deltas:S=>S.chrm+S.smt>=10?[{s:'smt',v:1},{s:'chrm',v:1},{s:'kind',v:1},{s:'hp',v:4}]:[{s:'smt',v:1},{s:'hp',v:1}],
    result:S=>S.chrm+S.smt>=10
      ?`コロニーに受け入れられた。\n食べ物と安全な寝床を一時的に提供してもらった。\n<span class="hl-gain">賢さと愛嬌が上がり、体力回復！</span>`
      :`ルールが複雑で覚えられなかった。\n追い出された。<span class="hl-gain">賢さが上がった。</span>`},
   {text:'ルールなど無視して入る',hints:[{t:'mnc',s:'+'},{t:'pow',s:'+'}],
    deltas:S=>S.mnc>=7?[{s:'mnc',v:1},{s:'pow',v:1},{s:'guts',v:1},{s:'hp',v:-2}]:[{s:'hp',v:-4},{s:'mnc',v:1}],
    result:S=>S.mnc>=7
      ?`コロニー全体が静まり返った。\n誰も${nm()}を止められなかった。\n<span class="hl-gain">迫力とパワーが上がった！</span>`
      :`全員に囲まれてボコボコにされた。\n<span class="hl-loss">体力が大幅に減った。</span>`},
 ]},
],

// ══════════════════════════ CH4: 晩年（8本）══════════════════════════
[
{id:'old_wound',label:'── 古い傷 ──',scene:'alley_night',
 text:S=>`ある朝、昔の傷が痛んだ。\n体はいつの間にか傷だらけになっていた。\nでも${nm()}は、確かに強くなっている。\n\nここまで生きてきた。それだけで十分かもしれない。`,
 choices:[
   {text:'傷を舐めながらも前に進む',hints:[{t:'pow',s:'+'}],
    deltas:[{s:'guts',v:2},{s:'pow',v:1},{s:'hp',v:-2}],
    result:`傷は痛むが、足は動く。\n${nm()}はまた歩き出した。\n<span class="hl-gain">パワーが上がった。</span>`},
   {text:'しばらく安全な場所で休む',hints:[{t:'smt',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'maxhp',v:1},{s:'hp',v:4}],
    result:`無理をしないことも知恵だ。\nゆっくり回復した。\n<span class="hl-gain">賢さが上がり、最大体力も増えた！</span>`},
   {text:'この傷を誇りにする',hints:[{t:'mnc',s:'+'}],
    deltas:[{s:'mnc',v:2},{s:'guts',v:1}],
    result:`傷の一つ一つに、生きてきた証がある。\n${nm()}は胸を張った。\n<span class="hl-strong">迫力が大きく上がった！</span>`},
 ]},

{id:'river_sunset',label:'── 川沿いの夕暮れ ──',scene:'river',
 text:S=>`夕暮れ、川沿いで${nm()}はぼんやりと水面を見ていた。\nオレンジ色の光が、水に揺れている。\n\n遠くから子どもの声が聞こえた。\n今日も生きている。`,
 choices:[
   {text:'この穏やかさをかみしめる',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'kind',v:1},{s:'hp',v:3}],
    result:`急がなくていい時間だった。\n${nm()}は静かに目を細めた。\n<span class="hl-gain">賢さが上がった。体力も回復。</span>`},
   {text:'明日の食べ物を探しに行く',hints:[{t:'smt',s:'+'},{t:'spd',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'spd',v:1},{s:'hp',v:2}],
    result:`のんびりしている暇はない。\n早めに動いた分、いい場所を確保できた。\n<span class="hl-gain">賢さと速さが上がった。</span>`},
   {text:'見知らぬ猫に声をかける',hints:[{t:'chrm',s:'+'}],
    deltas:S=>rnd()<0.4+S.chrm*0.05?[{s:'chrm',v:1},{s:'kind',v:1},{s:'hp',v:4}]:[{s:'chrm',v:1},{s:'kind',v:1}],
    result:S=>rnd()<0.5
      ?`その猫は警戒しながらも、少し話した。\n一瞬だが、孤独ではなかった。\n<span class="hl-gain">愛嬌が上がった！体力回復。</span>`
      :`その猫は逃げてしまった。\nそれでも、声をかけられた自分を誇らしく思った。\n<span class="hl-gain">愛嬌が上がった。</span>`},
 ]},

// ── 新規晩年イベント ──

{id:'ch4_last_winter',label:'── また冬が来た ──',scene:'snowfield',
 text:S=>`また冬が来た。\n何度目の冬だろうか。\n${nm()}の体には、それだけの傷がある。\n\nでも毎年、春は必ず来た。`,
 choices:[
   {text:'春まで生き延びると誓う',hints:[{t:'guts',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'guts',v:2},{s:'maxhp',v:1},{s:'hp',v:3}],
    result:`何があっても、春を見る。\nそれだけを胸に、${nm()}は歩き続けた。\n<span class="hl-gain">根性が上がり、最大体力も増えた！体力回復。</span>`},
   {text:'誰かと一緒に越える',hints:[{t:'kind',s:'+'},{t:'chrm',s:'+'}],
    deltas:[{s:'kind',v:1},{s:'chrm',v:1},{s:'solo',v:-1},{s:'hp',v:4}],
    result:`今年は一人じゃなかった。\n誰かと体を寄せ合って、冬を越えた。\n<span class="hl-gain">優しさと愛嬌が上がり、体力大幅回復！</span>`},
 ]},

{id:'ch4_first_friend',label:'── 初めての友達 ──',scene:'park_day',
 text:S=>`長い間、ひとりで生きてきた。\n今日、公園で一匹の猫が声をかけてきた。\n「一緒に食べないか」`,
 choices:[
   {text:'「ああ」と答える',hints:[{t:'chrm',s:'+'},{t:'kind',s:'+'}],
    deltas:[{s:'chrm',v:1},{s:'kind',v:2},{s:'solo',v:-2},{s:'hp',v:4}],
    result:`2匹で食べた。\n誰かと食べるご飯は、味が違った。\n<span class="hl-gain">愛嬌と優しさが上がり、体力回復！</span>`},
   {text:'「一人の方がいい」と断る',hints:[{t:'solo',s:'+'}],
    deltas:[{s:'solo',v:1},{s:'guts',v:1}],
    result:`相手は少し残念そうだったが、引かなかった。\nそれが${nm()}のやり方だ。`},
 ]},

{id:'ch4_old_territory',label:'── 昔の縄張り ──',scene:'alley_day',
 text:S=>`ふと気づくと、子猫の頃によくいた路地にいた。\n段ボールはもうない。\nでも、においはあの頃のままだ。`,
 choices:[
   {text:'しばらくここにいる',hints:[{t:'smt',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'hp',v:4},{s:'guts',v:1}],
    result:`ここから始まった。\n全部、ここから。\n${nm()}は目を閉じて、しばらくそのままいた。\n<span class="hl-gain">賢さが上がり、体力回復。</span>`},
   {text:'新しい場所を探す',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'smt',v:1}],
    result:`過去より、これから。\n${nm()}は前を向いて歩き出した。\n<span class="hl-gain">速さと賢さが上がった。</span>`},
 ]},

{id:'ch4_young_cat_advice',label:'── 若い猫への言葉 ──',scene:'alley_day',
 text:S=>`若い野良猫が${nm()}を見つけて近づいてきた。\n「あなたはどうやって強くなったのですか？」`,
 choices:[
   {text:'全てを教えてやる',hints:[{t:'smt',s:'+'},{t:'kind',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'kind',v:2},{s:'chrm',v:1},{s:'maxhp',v:1}],
    result:`${nm()}は長い時間をかけて話した。\n若い猫は真剣に聞いていた。\n教えることで、自分も整理できた。\n<span class="hl-gain">賢さと愛嬌が上がり、最大体力も増えた！</span>`},
   {text:'「自分で学べ」と突き放す',hints:[{t:'mnc',s:'+'}],
    deltas:[{s:'mnc',v:1},{s:'guts',v:1}],
    result:`厳しい言葉だったが、それが本当の答えかもしれない。\n<span class="hl-gain">迫力が上がった。</span>`},
   {text:'黙って隣を歩く',hints:[{t:'smt',s:'+'},{t:'kind',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'kind',v:1},{s:'solo',v:-1},{s:'hp',v:2}],
    result:`言葉より、見せる方がいい。\n2匹で街を歩いた。\n<span class="hl-gain">賢さと優しさが上がった。</span>`},
 ]},

{id:'ch4_last_song',label:'── 夜の歌 ──',scene:'park_night',
 text:S=>`深夜の公園。\n${nm()}は一人でいた。\n理由もなく、鳴きたくなった。`,
 choices:[
   {text:'思いきり鳴く',hints:[{t:'mnc',s:'+'}],
    deltas:[{s:'mnc',v:1},{s:'guts',v:1},{s:'solo',v:1}],
    result:`声は夜空に広がった。\n返事はなかった。\nでも、十分だった。\n<span class="hl-gain">迫力が上がった。</span>`},
   {text:'静かに鳴く',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'kind',v:1},{s:'hp',v:2}],
    result:`ちいさな声が、夜の静けさに溶けた。\n誰かに届いたかもしれない。\n<span class="hl-gain">賢さが上がり、体力も回復した。</span>`},
 ]},

{id:'human_child',label:'── 子どもの手 ──',scene:'park_day',
 text:S=>`公園で小さな子どもが手を伸ばしてきた。\n「ねこ！ねこ！」と叫びながら追いかけてくる。\n悪意はなさそうだが、手加減を知らない子どもの力でつかまれたらどうなるかわからない。`,
 choices:[
   {text:'全速力で逃げる',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:1}],
    result:`子どもを完全に撒いた。\n速さに磨きがかかった。\n<span class="hl-gain">速さが上がった。</span>`},
   {text:'おとなしく撫でさせてやる',hints:[{t:'chrm',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'chrm',v:2},{s:'kind',v:1},{s:'hp',v:3}],
    result:`子どもはわっと喜んで頭を撫でてくれた。\nそのうち母親が来て、ご飯までくれた。\n<span class="hl-strong">愛嬌が大きく上がった！体力も回復。</span>`},
   {text:'シャーッと威嚇する',hints:[{t:'mnc',s:'+'}],
    deltas:[{s:'mnc',v:1},{s:'cruel',v:1}],
    result:`子どもは泣き出した。でも距離をとってくれた。\n<span class="hl-gain">迫力が上がった。</span>\n子どもの泣き声が、しばらく耳に残った。`},
 ]},

{id:'disease',label:'── 体調不良 ──',scene:'alley_rain',
 text:S=>`ここ数日、体がだるい。\n鼻水が出て、くしゃみが止まらない。\n目やにで視界がかすんでいる。\n動くのが辛いが、食べ物を探さなければ。`,
 choices:[
   {text:'無理をしても食べ物を探し回る',hints:[{t:'hp',s:'-'}],
    deltas:[{s:'guts',v:2},{s:'hp',v:-3}],
    result:`ふらつきながらも食べ物を確保した。\n<span class="hl-loss">体力がさらに減った。</span>でも、倒れなかった。`},
   {text:'自販機の裏で温まりながら休む',hints:[{t:'smt',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'hp',v:4}],
    result:`機械の排熱で体が温まった。翌日、かなり楽になった。\n<span class="hl-gain">賢さが上がり、体力が回復した。</span>`},
   {text:'人通りの多い場所で鳴き続ける',hints:[{t:'chrm',s:'+'}],
    deltas:S=>rnd()<0.3+S.chrm*0.07?[{s:'chrm',v:1},{s:'hp',v:6},{s:'kind',v:1}]:[{s:'chrm',v:1},{s:'hp',v:-1}],
    result:S=>S.hp>8
      ?`心配した女性が動物病院に連れて行ってくれた。\n薬をもらって一気に回復した！\n<span class="hl-strong">愛嬌が上がり、体力が大幅回復！</span>`
      :`みんなに無視されたまま夜になった。\n<span class="hl-loss">体力がさらに減った。</span>`},
 ]},

{id:'restaurant_back',label:'── 料理屋の裏口 ──',scene:'alley_day',
 text:S=>`魚屋の裏口からいい匂いがしている。\n中年の板前が生ゴミを捨てに来た。\nこちらに気づいて、立ち止まっている。\n\n愛嬌：${S.chrm}`,
 choices:[
   {text:'愛想よくすり寄る',hints:[{t:'chrm',s:'+'},{t:'hp',s:'+'}],
    deltas:S=>S.chrm>=5?[{s:'chrm',v:1},{s:'maxhp',v:1},{s:'hp',v:5},{s:'kind',v:1}]:[{s:'chrm',v:1},{s:'hp',v:3}],
    result:S=>S.chrm>=5
      ?`板前は目を細めて「今日は特別だぞ」と新鮮な魚をくれた。\n<span class="hl-strong">愛嬌が上がり、最大体力まで増えた！</span>`
      :`板前はしゃがんで頭を撫で、魚のアラをくれた。\n<span class="hl-gain">愛嬌が上がり、体力回復！</span>`},
   {text:'素早くゴミ袋に飛びかかる',hints:[{t:'spd',s:'+'}],
    deltas:S=>S.spd>=4?[{s:'spd',v:1},{s:'hp',v:3}]:[{s:'spd',v:1},{s:'hp',v:-1}],
    result:S=>S.spd>=4
      ?`板前が怒鳴るより先に魚をくわえて逃げた。\n<span class="hl-gain">速さが上がった！</span>`
      :`板前に水をかけられ、びしょ濡れで逃げた。\n<span class="hl-loss">体力が少し減った。</span>`},
   {text:'遠くから様子を伺う',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'hp',v:2}],
    result:`板前が去ったあと、ゆっくりアラをもらった。\n慎重さが身についた。<span class="hl-gain">賢さが上がった。</span>`},
 ]},

{id:'wounded_bird',label:'── 傷ついた鳥 ──',scene:'park_day',
 text:S=>`草むらに、翼を怪我したすずめがいた。\n飛べずにぴょんぴょん跳ねている。\nお腹は少し減っている。`,
 choices:[
   {text:'躊躇わず仕留める',hints:[{t:'pow',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'pow',v:1},{s:'cruel',v:2},{s:'hp',v:4}],
    result:`本能のまま行動した。腹は満たされた。\n<span class="hl-gain">パワーが上がり、体力が回復した。</span>\nなんとなく、しばらく空を見上げた。`},
   {text:'近づいて匂いを嗅ぐだけにする',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'kind',v:2},{s:'smt',v:1}],
    result:`ちいさな命の鼓動を感じた。\nなぜかそのまま立ち去った。\n<span class="hl-gain">賢さが上がった。</span>\n空腹はつづく。`},
   {text:'追いかけ回して遊ぶ',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'cruel',v:1}],
    result:`鳥は必死に逃げた。追いかけることで足が速くなった。\n<span class="hl-gain">速さが上がった。</span>`},
 ]},

{id:'lost_kitten',label:'── 迷子の仔猫 ──',scene:'alley_night',
 text:S=>`夜の路地で、生まれて間もない仔猫が一匹、\n親とはぐれて鳴き続けていた。\n親の姿はどこにもない。\n自分もかつてはこうだったと、ふと思う。`,
 choices:[
   {text:'自分の食べ物を分けてやる',hints:[{t:'chrm',s:'+'}],
    deltas:[{s:'kind',v:2},{s:'chrm',v:1},{s:'hp',v:-1}],
    result:`仔猫は少し落ち着いた。\n${nm()}は自分の境遇を思い出しながら、食べ物を与えた。\n<span class="hl-gain">愛嬌が上がった。</span>`},
   {text:'夜明けまで傍にいて守る',hints:[{t:'mnc',s:'+'}],
    deltas:[{s:'guts',v:1},{s:'kind',v:1},{s:'mnc',v:1}],
    result:`夜明けまで傍に居続けた。翌朝、人間が仔猫を保護した。\n<span class="hl-gain">迫力が上がった。</span>`},
   {text:'自分には関係ないと去る',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'cruel',v:1},{s:'spd',v:1},{s:'solo',v:1}],
    result:`野良に感情移入は禁物だ、と言い聞かせた。\n仔猫の鳴き声がしばらく頭から離れなかった。\n<span class="hl-gain">速さが上がった。</span>`},
 ]},

{id:'summer_heat',label:'── 猛暑の昼 ──',scene:'summer',
 text:S=>`灼熱の夏。アスファルトが焼けて足裏が熱い。\n体の水分がどんどん失われていく。\n遠くに公園の噴水が見えるが、人が多い。\n\n賢さ：${S.smt}`,
 choices:[
   {text:'噴水に一直線に向かう',hints:[{t:'spd',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'hp',v:3}],
    result:`子どもたちの横をすり抜け、噴水で水を飲んだ。\n涼しくなった。<span class="hl-gain">速さが上がり体力回復！</span>`},
   {text:'コンビニの入口に陣取る',hints:[{t:'smt',s:'+'},{t:'chrm',s:'+'}],
    deltas:S=>S.smt>=5?[{s:'smt',v:1},{s:'chrm',v:1},{s:'hp',v:5}]:[{s:'smt',v:1},{s:'hp',v:2}],
    result:S=>S.smt>=5
      ?`店員が水とご飯をくれた。賢い選択だった。\n<span class="hl-strong">賢さと愛嬌が上がり、たっぷり体力回復！</span>`
      :`しばらくして追い払われたが、涼めた。\n<span class="hl-gain">賢さが上がった。</span>`},
   {text:'地面に伏せて夕方まで耐える',hints:[{t:'hp',s:'-'}],
    deltas:[{s:'guts',v:1},{s:'hp',v:-1}],
    result:`日が暮れて涼しくなった。\n<span class="hl-loss">体力は少し減ったが</span>、耐えた。`},
 ]},

{id:'garbage_day',label:'── ゴミ収集日の朝 ──',scene:'alley_day',
 text:S=>`今日はゴミ収集日。\nカラスや野良猫たちが集まっている。\n食べ物は豊富だが競争も激しい。\n\n速さ：${S.spd}　迫力：${S.mnc}`,
 choices:[
   {text:'最速で一番いいものを取る',hints:[{t:'spd',s:'+'},{t:'smt',s:'+'}],

{id:'crossroad',label:'── 岐路 ──',scene:'rooftop',
 text:S=>{
   const total=S.spd+S.pow+S.smt+S.chrm+S.mnc;
   const soloNote=S.solo>=8?`\n孤独は、ずっと${nm()}の相棒だった。`:'';
   return[
     `${nm()}は、ある満月の夜に屋上に登った。`,``,
     `街の灯りが眼下に広がっている。`,
     `ここまでの日々——`,
     `雨の夜の段ボール箱。老猫の眼差し。`,
     `痛みと、温もりと、孤独と。`,
     soloNote,``,
     total>=40?`強さはついた。${nm()}の名は、この街の路地に刻まれている。`
     :total>=25?`戦い、逃げ、食い、生き延びた。${nm()}は確かに強くなった。`
     :`弱かった。でも生きた。それだけは本当だった。`,``,
     `風が吹いた。`,`この命を、どこへ連れて行くのか。`,`今、選べ。`
   ].filter(l=>l!==undefined).join('\n');
 },
 choices:S=>{
   // マッハ猫条件判定
   // 速さ+選択肢があった全イベントで速さ+を選び続け、フラグが折れていない
   const isMachCat = !S._machBroken && S._machSpdAvail > 0 && S._machSpdTaken >= S._machSpdAvail;

   // ムキ猫条件判定
   const isMusclecat = !S._muscBroken && S._muscPowAvail > 0 && S._muscPowTaken >= S._muscPowAvail;

   // マフィア猫条件判定
   const isMafiacat = !S._mafiaBroken && S._mafiaMncAvail > 0 && S._mafiaMncTaken >= S._mafiaMncAvail;

   // ムキ猫とマフィア猫が両立している場合はランダムで決定（約7%の確率で発生）
   const gagMuscOrMafia = isMusclecat && isMafiacat
     ? (rnd()<0.5 ? 'gag_musclecat' : 'gag_mafiacat')
     : isMusclecat ? 'gag_musclecat'
     : isMafiacat  ? 'gag_mafiacat'
     : null;

   const total=S.spd+S.pow+S.smt+S.chrm+S.mnc;
   const base=[
     {text:'野良として、自由に生き続ける',hints:[{t:'spd',s:'+'}],
      deltas:[{s:'spd',v:1},{s:'guts',v:1},{s:'solo',v:1}],
      result:S=>S.solo>=8?`孤高の道を選んだ。誰も追いつけない。`:`自由を選んだ。`,
      ending:S=>{
        if(isMachCat) return 'gag_machcat';
        if(gagMuscOrMafia) return gagMuscOrMafia;
        if(S.solo>=8) return 'loner';
        if(S.spd+S.pow+S.smt+S.chrm+S.mnc>=60) return 'legend';
        return 'wild';
      }},
     {text:'人間のそばで暮らす道を選ぶ',hints:[{t:'chrm',s:'+'}],
      deltas:[{s:'chrm',v:1},{s:'kind',v:1},{s:'solo',v:-1}],
      result:`温もりを選んだ。`,
      ending:S=>isMachCat?'gag_machcat':gagMuscOrMafia||'domestic'},
     {text:'群れのボスとして街を統べる',hints:[{t:'mnc',s:'+'},{t:'pow',s:'+'}],
      deltas:[{s:'mnc',v:1},{s:'pow',v:1}],
      result:S=>S.kind>=9&&S.cruel<=3?`仲間たちのそばに立つことを選んだ。`:`強さを選んだ。`,
      ending:S=>{
        if(isMachCat) return 'gag_machcat';
        if(gagMuscOrMafia) return gagMuscOrMafia;
        if(S.kind>=9&&S.cruel<=3) return 'colony';
        if(S.kind>=7&&S.mnc>=8) return 'peacemaker';
        return 'boss';
      }},
   ];
   // 条件付き隠し選択肢（ギャグ条件達成中は隠し選択肢を出さない）
   const anyGag = isMachCat || !!gagMuscOrMafia;
   if(!anyGag && S.kind>=10&&S.cruel<=2){
     base.push({
       text:'弱い猫たちを集めてコロニーを作る',hints:[{t:'chrm',s:'+'}],
       deltas:[{s:'kind',v:1},{s:'chrm',v:1},{s:'solo',v:-2}],
       result:`仲間を選んだ。それが${nm()}の答えだった。`,
       ending:'colony'
     });
   }
   if(!anyGag && S.mnc>=8&&S.chrm>=7&&S.kind>=5){
     base.push({
       text:'争いを止める側に立つ',hints:[{t:'mnc',s:'+'},{t:'chrm',s:'+'}],
       deltas:[{s:'mnc',v:1},{s:'chrm',v:1},{s:'kind',v:1}],
       result:`戦うより、繋ぐことを選んだ。`,
       ending:'guardian'
     });
   }
   return base;
 }
},
],
];

// ================================================================
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

// 特殊イベントはプレイ中に条件を満たしたタイミングで次イベントの直前に割り込む
let QUEUE=[], QIDX=0;
let _specialQueue=[...SPECIAL_EVENTS]; // 未使用の特殊イベントプール
let _wishPending=false;  // 競合により保留中フラグ
let _wishUsed=false;     // 1プレイにつき1回制限フラグ

function buildQueue(){
  const q=[];
  // CH0: 産声は4種からランダムに1本
  const ch0=[...CHAPTERS[0]]; shuffle(ch0); q.push(ch0[0]);
  // CH1: 子猫期15本から7本抽選
  const ch1=[...CHAPTERS[1]]; shuffle(ch1); q.push(...ch1.slice(0,7));
  // CH1追加：命名後の最初の試練（B案）はCH1から別途1本を先頭に固定
  // ※ 既にch1[0]が入っているので追加抽選はスキップ
  // CH2: 若猫期28本から12本抽選
  const ch2=[...CHAPTERS[2]]; shuffle(ch2); q.push(...ch2.slice(0,12));
  // CH3: 後半18本から7本抽選
  const ch3=[...CHAPTERS[3]]; shuffle(ch3); q.push(...ch3.slice(0,7));
  // CH4: 晩年（岐路含む）から晩年部分5本＋岐路
  const ch4events=[...CHAPTERS[4]];
  const crossroad=ch4events.find(e=>e.id==='crossroad');
  const ch4rest=ch4events.filter(e=>e.id!=='crossroad');
  shuffle(ch4rest); q.push(...ch4rest.slice(0,5));
  if(crossroad) q.push(crossroad);
  return q;
}

// 次のイベントを取得するときに特殊イベントの条件をチェックして割り込ませる
function getNextEvent(){
  // ── 通常特殊イベントの条件チェック ──
  let specialHit=null;
  for(let i=0;i<_specialQueue.length;i++){
    const sp=_specialQueue[i];
    if(sp.cond(S)&&!S.specialUsed[sp.id]){
      _specialQueue.splice(i,1);
      S.specialUsed[sp.id]=true;
      specialHit=sp;
      break;
    }
  }

  // ── 願いイベントの判定（1プレイ1回・他の特殊と競合したら次ターンへ保留）──
  if(!_wishUsed){
    if(specialHit){
      // このターンは他の特殊が割り込んだ → 新規当選分のみ保留、既存保留は維持
      if(!_wishPending && Math.random()<0.01) _wishPending=true;
      return specialHit;
    } else {
      // 保留中 または 新規1%当選
      if(_wishPending || Math.random()<0.01){
        _wishPending=false;
        _wishUsed=true;
        return WISH_EVENT;
      }
    }
  }

  // specialHitがあれば返す（願いが不発だったターン）
  if(specialHit) return specialHit;

  if(QIDX>=QUEUE.length) return null;
  return QUEUE[QIDX++];
}

function renderEvent(ev){
  if(!ev){showEnding('survive');return;}
  setScene(ev.scene||'alley_day');
  document.getElementById('scene-lbl').textContent=ev.label||'';
  const txt=typeof ev.text==='function'?ev.text(S):ev.text;
  document.getElementById('narr').innerHTML=txt.replace(/\n/g,'<br>');
  document.getElementById('delta').innerHTML='';
  document.getElementById('cont').style.display='none';

  if(ev.special&&ev.banner){
    showSpecialBanner(ev.banner);
    document.getElementById('app').classList.add('fx-special');
    setTimeout(()=>document.getElementById('app').classList.remove('fx-special'),650);
  }

  const choicesEl=document.getElementById('choices');
  choicesEl.innerHTML='';
  const hintNames={spd:'速さ',pow:'パワー',smt:'賢さ',chrm:'愛嬌',mnc:'迫力',hp:'体力'};
  // choices は配列または関数(S)=>配列 の両形式に対応
  const choiceList=typeof ev.choices==='function'?ev.choices(S):ev.choices;
  choiceList.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='cbtn';
    // hintsにはspd/pow/smt/chrm/mnc/hpのみ表示（マスク項目は除外）
    const visHints=(c.hints||[]).filter(h=>['spd','pow','smt','chrm','mnc','hp'].includes(h.t));
    const hintsHtml=visHints.length
      ?`<span class="cbtn-hint">${visHints.map(h=>`<span class="hc hc-${h.t}">${hintNames[h.t]}${h.s}</span>`).join('')}</span>`
      :'';
    btn.innerHTML=`<span class="cbtn-main">${c.text}</span>${hintsHtml}`;
    btn.addEventListener('click',()=>choose(ev,c));
    choicesEl.appendChild(btn);
  });
  document.getElementById('scroll').scrollTop=0;
}

function choose(ev,choice){
  document.querySelectorAll('.cbtn').forEach(b=>b.classList.add('disabled'));

  // ── マッハ猫トラッキング（A案：速さ+ヒントがある選択肢を選んだかを記録）──
  if(!S._machBroken && ev.id !== 'crossroad'){
    const allChoices = typeof ev.choices==='function' ? ev.choices(S) : ev.choices;
    // このイベントに速さ+ヒントを持つ選択肢が1つ以上あるか
    const hasSpdChoice = allChoices.some(c => (c.hints||[]).some(h=>h.t==='spd'&&h.s==='+'));
    if(hasSpdChoice){
      S._machSpdAvail++;
      // 今回選んだ選択肢に速さ+ヒントがあるか
      const choseSpdChoice = (choice.hints||[]).some(h=>h.t==='spd'&&h.s==='+');
      if(choseSpdChoice){
        S._machSpdTaken++;
      } else {
        // 速さ+選択肢があったのに選ばなかった → フラグ折れ
        S._machBroken = true;
      }
    }
  }

  // ── ムキ猫トラッキング（パワー+ヒントがある選択肢を選んだかを記録）──
  if(!S._muscBroken && ev.id !== 'crossroad'){
    const allChoices2 = typeof ev.choices==='function' ? ev.choices(S) : ev.choices;
    const hasPowChoice = allChoices2.some(c => (c.hints||[]).some(h=>h.t==='pow'&&h.s==='+'));
    if(hasPowChoice){
      S._muscPowAvail++;
      const chosePowChoice = (choice.hints||[]).some(h=>h.t==='pow'&&h.s==='+');
      if(chosePowChoice){
        S._muscPowTaken++;
      } else {
        S._muscBroken = true;
      }
    }
  }

  // ── マフィア猫トラッキング（迫力+ヒントがある選択肢を選んだかを記録）──
  if(!S._mafiaBroken && ev.id !== 'crossroad'){
    const allChoices3 = typeof ev.choices==='function' ? ev.choices(S) : ev.choices;
    const hasMncChoice = allChoices3.some(c => (c.hints||[]).some(h=>h.t==='mnc'&&h.s==='+'));
    if(hasMncChoice){
      S._mafiaMncAvail++;
      const choseMncChoice = (choice.hints||[]).some(h=>h.t==='mnc'&&h.s==='+');
      if(choseMncChoice){
        S._mafiaMncTaken++;
      } else {
        S._mafiaBroken = true;
      }
    }
  }

  const rawD=choice.deltas;
  const deltas=typeof rawD==='function'?rawD(S):rawD;
  const prev=apply(deltas);
  S.day++;
  if(choice.name) S.name=choice.name;
  updateUI(prev);

  ['spd','pow','smt','chrm','mnc'].forEach(p=>{
    if((S[p]||0)-(prev[p]||0)>=2) flashLevelUp(p);
  });

  const resultTxt=typeof choice.result==='function'?choice.result(S):choice.result;
  document.getElementById('narr').innerHTML=
    (typeof ev.text==='function'?ev.text(S):ev.text).replace(/\n/g,'<br>')+
    `<br><br>${resultTxt}`;

  const gained=S.hp>(prev.hp||0)||S.maxHp>(prev.maxHp||0);
  const lost=S.hp<(prev.hp||0);
  const app=document.getElementById('app');
  if(gained){app.classList.add('fx-gain');setTimeout(()=>app.classList.remove('fx-gain'),500);}
  else if(lost){app.classList.add('fx-loss');setTimeout(()=>app.classList.remove('fx-loss'),500);}

  showDeltas(deltas);
  document.getElementById('choices').innerHTML='';
  document.getElementById('scroll').scrollTop=0;

  // エンディング分岐 or 死亡 → 専用ボタンを表示（curtain演出付き）
  if(S.hp<=0){
    S._pendingEnding=S.guts>=8?'dead_brave':'dead';
    showEndingTransitionBtn();
    return;
  }
  if(choice.ending){
    // ending は文字列または関数(S)=>文字列 の両形式に対応
    const endingId=typeof choice.ending==='function'?choice.ending(S):choice.ending;
    S._pendingEnding=endingId;
    showEndingTransitionBtn();
    return;
  }

  // 通常は「つづける」ボタン
  document.getElementById('cont').style.display='block';
}

function showEndingTransitionBtn(){
  // 「エンディングへ」ボタンを表示し、テキストを十分読める時間を確保
  document.getElementById('cont').style.display='none';
  document.getElementById('ending-readmore').style.display='block';
  document.getElementById('scroll').scrollTop=0;
}

function onEndingReadmore(){
  document.getElementById('ending-readmore').style.display='none';
  // カーテン演出（暗転）してからオーバーレイを開く
  const curtain=document.getElementById('curtain');
  curtain.classList.add('falling');
  setTimeout(()=>{
    showEnding(S._pendingEnding||'survive');
    setTimeout(()=>{
      curtain.classList.remove('falling');
    },400);
  },1800);
}

function onContinue(){
  document.getElementById('cont').style.display='none';
  document.getElementById('delta').innerHTML='';
  renderEvent(getNextEvent());
}

function loadUnlocked(){
  try{
    const raw=localStorage.getItem('noraneko_endings');
    return raw?JSON.parse(raw):[];
  }catch(e){return[];}
}
function saveUnlocked(arr){
  try{localStorage.setItem('noraneko_endings',JSON.stringify(arr));}catch(e){}
}
function unlockEnding(id){
  const arr=loadUnlocked();
  if(!arr.includes(id)){arr.push(id);saveUnlocked(arr);}
}

function renderEndingCounter(currentId){
  const unlocked=loadUnlocked();
  const iconsEl=document.getElementById('ov-counter-icons');
  const textEl=document.getElementById('ov-counter-text');
  iconsEl.innerHTML='';
  ALL_ENDINGS.forEach(e=>{
    const div=document.createElement('div');
    div.className='end-icon'+(e.id===currentId?' current':unlocked.includes(e.id)?' unlocked':'');
    div.textContent=unlocked.includes(e.id)||e.id===currentId?e.emoji:'？';
    div.title=unlocked.includes(e.id)||e.id===currentId?e.name:'???';
    iconsEl.appendChild(div);
  });
  const count=unlocked.length;
  const total=ALL_ENDINGS.length;
  // 今回が初解除かチェック
  const isNew=!loadUnlocked().includes(currentId);
  textEl.textContent=`${count} / ${total} 種達成${isNew?' ★ NEW！':''}`;
}

function showEnding(type){
  // まず今回のエンディングを解除登録（renderEndingCounter呼び出し前に）
  // isNewの判定のため、unlock前にチェック
  const wasLocked=!loadUnlocked().includes(type);
  unlockEnding(type);

  const ed=ENDING_DATA[type]||ENDING_DATA.survive;
  document.getElementById('ov-title').textContent=ed.title;
  const poem=typeof ed.poem==='function'?ed.poem(S):ed.poem;
  document.getElementById('ov-poem').textContent=poem;
  const story=typeof ed.story==='function'?ed.story(S):ed.story;
  document.getElementById('ov-story').innerHTML=story.replace(/\n/g,'<br>');

  const pnames={spd:'速さ',pow:'パワー',smt:'賢さ',chrm:'愛嬌',mnc:'迫力'};
  document.getElementById('ov-stats').innerHTML=
    ['spd','pow','smt','chrm','mnc'].map(p=>
      `<div class="esr"><span class="esn">${pnames[p]}</span><span class="esv">${S[p]}</span></div>`
    ).join('');

  const dom=getDominantMask();
  const maskDescs={
    guts:`根性の猫\n逆境の中でも決して諦めなかった。その魂は傷つきながらも折れることがなかった。`,
    kind:`優しい猫\n弱い者に手を差し伸べ、争いよりも和を選んだ。その温もりが多くの命に触れた。`,
    cruel:`孤高の猫\n感情に流されず、生存を最優先にした。冷酷に見えて、それは野良として生きるための強さだった。`,
    solo:`孤独の猫\nひとりで生き、ひとりで戦い、ひとりで眠った。誰にも頼らないことが、この猫の誇りだった。`,
  };
  document.getElementById('ov-mask-text').textContent=maskDescs[dom]||'';

  // エンディングカウンター（isNewは unlock前のフラグを使う）
  const unlocked=loadUnlocked();
  const count=unlocked.length;
  const total=ALL_ENDINGS.length;
  const iconsEl=document.getElementById('ov-counter-icons');
  iconsEl.innerHTML='';
  ALL_ENDINGS.forEach(e=>{
    const div=document.createElement('div');
    div.className='end-icon'+(e.id===type?' current':unlocked.includes(e.id)?' unlocked':'');
    div.textContent=unlocked.includes(e.id)?e.emoji:'？';
    iconsEl.appendChild(div);
  });
  document.getElementById('ov-counter-text').textContent=
    `${count} / ${total} 種達成`+(wasLocked?' ✦ NEW！':'');

  document.getElementById('ov').classList.add('show');
}

// ================================================================
// TITLE / PASSWORD / EVENT VIEWER
// ================================================================
const PW_SECRET='またたびの雄叫び';
const MASK_STATS=['guts','kind','cruel','solo']; // プレイヤー非表示
const PARAM_NAMES={spd:'速さ',pow:'パワー',smt:'賢さ',chrm:'愛嬌',mnc:'迫力',hp:'体力',maxhp:'最大体力'};

function showLayer(id){
  ['title-screen','pw-screen','ev-screen'].forEach(s=>{
    document.getElementById(s).classList.remove('show');
  });
  if(id) document.getElementById(id).classList.add('show');
}

function goTitle(){
  closeDetail();
  showLayer('title-screen');
}

function startGame(){
  showLayer(null);
  if(!S._started){
    S._started=true;
    newState();
    QUEUE=buildQueue();
    QIDX=0;
    _specialQueue=[...SPECIAL_EVENTS];
    _wishPending=false;
    _wishUsed=false;
    updateUI();
    renderEvent(getNextEvent());
  }
}

function goPassword(){
  document.getElementById('pw-input').value='';
  clearPwError();
  showLayer('pw-screen');
  setTimeout(()=>document.getElementById('pw-input').focus(),350);
}

function checkPw(){
  const val=document.getElementById('pw-input').value.trim();
  if(val===PW_SECRET){
    clearPwError();
    buildEvList();
    showLayer('ev-screen');
  } else {
    const inp=document.getElementById('pw-input');
    inp.classList.remove('shake');
    void inp.offsetWidth;
    inp.classList.add('shake');
    setTimeout(()=>inp.classList.remove('shake'),350);
    document.getElementById('pw-error').classList.add('show');
  }
}
function clearPwError(){document.getElementById('pw-error').classList.remove('show');}

// ── イベント一覧構築 ──
function buildEvList(){
  const list=document.getElementById('ev-list');
  list.innerHTML='';

  // 章ラベル定義
  const chapterLabel=(id)=>{
    if(SPECIAL_EVENTS.find(e=>e.id===id)) return '特殊イベント';
    for(let ci=0;ci<CHAPTERS.length;ci++){
      if(CHAPTERS[ci].find(e=>e.id===id)){
        return ['序章','子猫期','若猫期','後半の試練','晩年'][ci]||`第${ci}章`;
      }
    }
    return '';
  };

  // 通常イベント（CHAPTERS）
  const sections=[
    {label:'── 序章 ──', events:CHAPTERS[0]},
    {label:'── 子猫期 ──', events:CHAPTERS[1]},
    {label:'── 若猫期 ──', events:CHAPTERS[2]},
    {label:'── 後半の試練 ──', events:CHAPTERS[3]},
    {label:'── 晩年 ──', events:CHAPTERS[4]},
    {label:'── 特殊イベント ──', events:SPECIAL_EVENTS},
    {label:'── 隠しイベント ──', events:[WISH_EVENT]},
    {label:'── ギャグエンディング ──', events:[
      {
        id:'gag_machcat', label:'── 音を置き去りにした猫 ──', scene:'rooftop',
        text:`※ このエンディングは"岐路"イベントに到達します。\n\n【発生条件】\n速さ+の選択肢が存在するイベントで、毎回速さ+の選択肢を選び続けてゲームを完走すること。`,
        choices:[
          {text:'（岐路でどの選択肢を選んでも発動）',hints:[],
           deltas:[],result:'速さだけを追い求めた一生の果てに。'}
        ]
      },
      {
        id:'gag_musclecat', label:'── 鍛え抜かれた猫 ──', scene:'alley_rain',
        text:`※ このエンディングは"岐路"イベントに到達します。\n\n【発生条件】\nパワー+の選択肢が存在するイベントで、毎回パワー+の選択肢を選び続けてゲームを完走すること。`,
        choices:[
          {text:'（岐路でどの選択肢を選んでも発動）',hints:[],
           deltas:[],result:'パワーだけを追い求めた一生の果てに。'}
        ]
      },
      {
        id:'gag_mafiacat', label:'── 貫禄を極めた猫 ──', scene:'alley_night',
        text:`※ このエンディングは"岐路"イベントに到達します。\n\n【発生条件】\n迫力+の選択肢が存在するイベントで、毎回迫力+の選択肢を選び続けてゲームを完走すること。`,
        choices:[
          {text:'（岐路でどの選択肢を選んでも発動）',hints:[],
           deltas:[],result:'迫力だけを追い求めた一生の果てに。'}
        ]
      },
    ]},
  ];

  sections.forEach(sec=>{
    const hd=document.createElement('div');
    hd.className='ev-section-head';
    hd.textContent=sec.label;
    list.appendChild(hd);

    sec.events.forEach(ev=>{
      const div=document.createElement('div');
      div.className='ev-item';
      div.innerHTML=`
        <span class="ev-item-label">${ev.label||''}</span>
        <span class="ev-item-name">${ev.id}</span>
        <span class="ev-item-tag">${ev.special?'特殊'+(ev.cond?'・条件付き':''):chapterLabel(ev.id)}</span>
      `;
      div.addEventListener('click',()=>openDetail(ev));
      list.appendChild(div);
    });
  });
}

// ── イベント詳細 ──
function openDetail(ev){
  document.getElementById('ev-detail-lbl').textContent=ev.label||ev.id;

  // テキスト（関数形式も仮Sで展開）
  const dummyS={spd:5,pow:5,smt:5,chrm:5,mnc:5,hp:10,maxHp:10,guts:5,kind:5,cruel:5,solo:5,name:'この猫'};
  const txt=typeof ev.text==='function'?ev.text(dummyS):ev.text;

  // 選択肢（関数形式も展開）
  const choiceList=typeof ev.choices==='function'?ev.choices(dummyS):ev.choices;

  const deltaHtml=(deltas)=>{
    if(!deltas) return '';
    const raw=typeof deltas==='function'?deltas(dummyS):deltas;
    return raw
      .filter(d=>!MASK_STATS.includes(d.s)) // マスク項目は完全非表示
      .map(d=>{
        const sign=d.v>0?'+':'';
        const cls=d.s==='hp'||d.s==='maxhp'?'dc dc-hp':d.v>0?'dc dc-gain':'dc dc-loss';
        return `<span class="${cls}">${PARAM_NAMES[d.s]||d.s} ${sign}${d.v}</span>`;
      }).join('');
  };

  document.getElementById('ev-detail-body').innerHTML=`
    <div class="ev-scene">${txt.replace(/\n/g,'<br>')}</div>
    <div class="ev-choices-lbl">── 選択肢 ──</div>
    ${choiceList.map(c=>{
      const resultTxt=typeof c.result==='function'?c.result(dummyS):(c.result||'');
      const rawD=c.deltas;
      const dHtml=deltaHtml(rawD);
      return `<div class="ev-choice-card">
        <div class="ev-choice-text">▶ ${c.text}</div>
        <div class="ev-choice-result">${resultTxt.replace(/\n/g,'<br>').replace(/<span class="hl-\w+">(.*?)<\/span>/g,'$1')}</div>
        ${dHtml?`<div class="ev-deltas">${dHtml}</div>`:''}
      </div>`;
    }).join('')}
  `;

  document.getElementById('ev-detail').classList.add('show');
}

function closeDetail(){
  document.getElementById('ev-detail').classList.remove('show');
}

// ================================================================
// INIT
// ================================================================
function resetGame(){
  document.getElementById('ov').classList.remove('show');
  document.getElementById('ending-readmore').style.display='none';
  document.getElementById('cont').style.display='none';
  S._started=false;
  _wishPending=false;
  _wishUsed=false;
  goTitle();
}

// 初回はタイトル表示のみ（ゲームはstartGame()で起動）
newState();
</script>
