<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>のらねこ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;700;800&family=Zen+Antique+Soft&display=swap');
:root{
  --bg:#0c0a08;--surface:#161310;--surface2:#1e1a16;--surface3:#26211b;
  --border:#332b22;--border2:#453a2e;
  --text:#ede0ce;--text2:#9a8878;--text3:#5a4e42;
  --amber:#d4902a;--amber2:#f0b84a;--amber3:#ffd070;
  --rust:#c04830;--rust2:#e06050;
  --sky:#4a7898;--lav2:#b0a0d0;
  --spd:#4a9898;--pow:#c04830;--smt:#7a68b8;--chrm:#c07890;--mnc:#c09030;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:var(--bg);font-family:'Shippori Mincho B1','Zen Antique Soft',serif;color:var(--text);overflow:hidden;}

#app{width:100%;height:100dvh;max-width:430px;margin:0 auto;display:flex;flex-direction:column;position:relative;background:var(--bg);padding-top:var(--safe-top);padding-bottom:var(--safe-bot);}

/* HEADER */
#hdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:9px 14px 7px;background:var(--surface);border-bottom:1px solid var(--border);}
#hdr-title{font-size:.95rem;font-weight:800;color:var(--amber);letter-spacing:.22em;}
#hdr-right{display:flex;align-items:center;gap:10px;}
#day-badge{font-size:.65rem;color:var(--text3);letter-spacing:.1em;}
#phase-badge{font-size:.6rem;padding:2px 8px;border:1px solid var(--border2);border-radius:10px;color:var(--text2);letter-spacing:.08em;}

/* PARAMS */
#pbar{flex-shrink:0;display:flex;gap:5px;padding:7px 10px 6px;background:var(--surface);border-bottom:1px solid var(--border);}
.pi{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0;}
.pi-label{font-size:.52rem;color:var(--text3);text-align:center;letter-spacing:.04em;}
.pi-bw{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;}
.pi-b{height:100%;border-radius:2px;transition:width .7s cubic-bezier(.4,0,.2,1);}
.b-spd{background:var(--spd);}.b-pow{background:var(--pow);}.b-smt{background:var(--smt);}.b-chrm{background:var(--chrm);}.b-mnc{background:var(--mnc);}
.pi-val{font-size:.62rem;color:var(--text2);text-align:center;font-variant-numeric:tabular-nums;transition:color .3s;}
.pi-val.leveled{color:var(--amber3);animation:valPop .5s ease;}
@keyframes valPop{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}

/* ILLUST */
#illust{flex-shrink:0;height:140px;position:relative;overflow:hidden;background:var(--surface);border-bottom:1px solid var(--border);}
#illust-bg{position:absolute;inset:0;transition:background 1.2s ease;}
#illust-fg{position:absolute;inset:0;}
#illust-svg{position:absolute;bottom:0;left:50%;transform:translateX(-50%);height:128px;}

/* SPECIAL EVENT BANNER */
#special-banner{display:none;position:absolute;top:0;left:0;right:0;z-index:5;padding:5px 14px 4px;background:linear-gradient(90deg,rgba(120,80,20,.0),rgba(180,100,20,.35),rgba(120,80,20,.0));text-align:center;font-size:.62rem;color:var(--amber2);letter-spacing:.18em;border-bottom:1px solid rgba(212,146,42,.2);}

/* SCROLL */
#scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;}

/* TEXT */
#tbox{padding:14px 16px 10px;border-bottom:1px solid var(--border);}
#scene-lbl{font-size:.6rem;color:var(--amber);letter-spacing:.25em;margin-bottom:7px;}
#narr{font-size:.9rem;line-height:2.1;color:var(--text);white-space:pre-line;min-height:55px;}
.hl-gain{color:var(--amber2);font-weight:700;}
.hl-loss{color:var(--rust2);font-weight:700;}
.hl-info{color:var(--sky);}
.hl-strong{color:var(--amber3);font-weight:700;font-size:1rem;}
.hl-special{color:#e0b8f0;font-weight:700;}

/* DELTAS */
#delta{padding:0 14px;min-height:0;}
.delta-row{display:flex;gap:7px;flex-wrap:wrap;padding:8px 0 6px;border-bottom:1px dashed var(--border);}
.dc{font-size:.72rem;padding:3px 10px;border-radius:12px;font-weight:700;letter-spacing:.04em;animation:dcIn .35s ease;}
@keyframes dcIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.dc-gain{background:rgba(212,146,42,.16);color:var(--amber2);border:1px solid rgba(212,146,42,.28);}
.dc-loss{background:rgba(192,72,48,.16);color:var(--rust2);border:1px solid rgba(192,72,48,.28);}
.dc-hp{background:rgba(80,160,80,.14);color:#6ab870;border:1px solid rgba(80,160,80,.25);}

/* CHOICES */
#choices{padding:10px 12px 14px;display:flex;flex-direction:column;gap:8px;}
.cbtn{background:var(--surface2);border:1px solid var(--border2);border-radius:3px;padding:12px 14px;text-align:left;font-family:'Shippori Mincho B1',serif;font-size:.87rem;color:var(--text);cursor:pointer;-webkit-appearance:none;width:100%;transition:background .15s,border-color .15s,transform .1s;line-height:1.65;display:flex;flex-direction:column;gap:5px;}
.cbtn:active{background:var(--surface3);border-color:var(--amber);transform:scale(.985);}
.cbtn.disabled{opacity:.45;pointer-events:none;}
.cbtn-main{color:var(--text);}
.cbtn-hint{font-size:.66rem;color:var(--text3);display:flex;gap:5px;flex-wrap:wrap;font-weight:400;}
.hc{padding:1px 7px;border-radius:8px;font-size:.63rem;}
.hc-spd{background:rgba(74,152,152,.14);color:var(--spd);}
.hc-pow{background:rgba(192,72,48,.14);color:var(--pow);}
.hc-smt{background:rgba(122,104,184,.14);color:var(--smt);}
.hc-chrm{background:rgba(192,120,144,.14);color:var(--chrm);}
.hc-mnc{background:rgba(192,144,48,.14);color:var(--mnc);}
.hc-hp{background:rgba(80,160,80,.13);color:#6ab870;}

/* CONTINUE */
#cont{display:none;margin:2px 12px 14px;padding:13px;background:var(--surface2);border:1px solid var(--border2);border-radius:3px;color:var(--amber);font-family:'Shippori Mincho B1',serif;font-size:.88rem;letter-spacing:.2em;cursor:pointer;text-align:center;-webkit-appearance:none;transition:background .15s;}
#cont:active{background:var(--surface3);}

/* HP */
#hprow{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:6px 14px;background:var(--surface);border-top:1px solid var(--border);}
#hp-lbl{font-size:.62rem;color:var(--text3);white-space:nowrap;}
#hp-bw{flex:1;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;}
#hp-b{height:100%;background:linear-gradient(90deg,#b04040,#e06060);border-radius:3px;transition:width .5s ease;}
#hp-val{font-size:.62rem;color:var(--text2);white-space:nowrap;font-variant-numeric:tabular-nums;}

/* LEVEL UP BANNER */
#lvl-banner{display:none;position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);z-index:30;pointer-events:none;text-align:center;animation:lvlAnim .9s ease forwards;}
@keyframes lvlAnim{0%{opacity:0;transform:translateY(-50%) scale(.8)}25%{opacity:1;transform:translateY(-50%) scale(1.08)}70%{opacity:1;transform:translateY(-50%) scale(1)}100%{opacity:0;transform:translateY(-50%) scale(1)}}
#lvl-inner{display:inline-block;background:rgba(12,10,8,.9);border:1px solid var(--amber);border-radius:4px;padding:10px 28px;font-size:1.05rem;font-weight:800;color:var(--amber3);letter-spacing:.2em;box-shadow:0 0 30px rgba(212,146,42,.35);}

/* OVERLAY */
#ov{display:none;position:absolute;inset:0;background:rgba(8,6,4,.95);z-index:20;flex-direction:column;align-items:center;justify-content:flex-start;gap:0;padding:28px 20px 24px;text-align:center;overflow-y:auto;}
#ov.show{display:flex;}
#ov-title{font-size:1.5rem;font-weight:800;color:var(--amber);letter-spacing:.28em;line-height:1.55;margin-bottom:12px;}
#ov-poem{font-size:.82rem;color:var(--text2);line-height:2.2;max-width:300px;margin-bottom:14px;white-space:pre-line;}
#ov-story{font-size:.85rem;color:var(--text);line-height:2.2;max-width:320px;margin-bottom:16px;white-space:pre-line;text-align:left;}
.ov-div{width:80px;height:1px;background:var(--border2);margin:4px auto 14px;}
#ov-stats{width:100%;max-width:300px;display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.esr{display:flex;justify-content:space-between;align-items:center;font-size:.78rem;padding:5px 12px;background:var(--surface2);border-radius:3px;}
.esn{color:var(--text2);}.esv{color:var(--amber2);font-weight:700;}
#ov-mask{width:100%;max-width:300px;padding:10px 14px;background:rgba(120,100,160,.1);border:1px solid rgba(120,100,160,.25);border-radius:3px;margin-bottom:18px;}
#ov-mask-title{font-size:.6rem;color:var(--lav2);letter-spacing:.15em;margin-bottom:6px;}
#ov-mask-text{font-size:.78rem;color:#c8b8e0;line-height:1.85;}
#ov-btn{padding:13px 44px;background:var(--amber);border:none;border-radius:3px;font-family:'Shippori Mincho B1',serif;font-size:.95rem;letter-spacing:.2em;color:var(--bg);cursor:pointer;-webkit-appearance:none;}
#ov-btn:active{background:var(--amber2);}

/* FX */
@keyframes fx-gain{0%,100%{background:var(--bg)}45%{background:#1c1508}}
@keyframes fx-loss{0%,100%{background:var(--bg)}45%{background:#180808}}
@keyframes fx-special{0%,100%{background:var(--bg)}45%{background:#14101c}}
#app.fx-gain{animation:fx-gain .45s ease;}
#app.fx-loss{animation:fx-loss .45s ease;}
#app.fx-special{animation:fx-special .6s ease;}

/* ENDING TRANSITION CURTAIN */
#curtain{
  display:none;position:absolute;inset:0;z-index:25;
  background:var(--bg);opacity:0;pointer-events:none;
}
#curtain.falling{
  display:block;pointer-events:all;
  animation:curtainFall 2.4s ease forwards;
}
@keyframes curtainFall{
  0%{opacity:0}
  35%{opacity:1}
  80%{opacity:1}
  100%{opacity:1}
}

/* ENDING COUNTER */
#ov-counter{
  width:100%;max-width:300px;
  margin-bottom:14px;
  padding:10px 14px;
  background:rgba(212,146,42,.08);
  border:1px solid rgba(212,146,42,.2);
  border-radius:3px;
  text-align:center;
}
#ov-counter-title{font-size:.58rem;color:var(--text3);letter-spacing:.2em;margin-bottom:8px;}
#ov-counter-icons{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:6px;}
.end-icon{
  width:28px;height:28px;border-radius:50%;
  border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;color:var(--text3);
  transition:all .4s ease;
  position:relative;
}
.end-icon.unlocked{
  border-color:var(--amber);
  color:var(--amber2);
  background:rgba(212,146,42,.12);
}
.end-icon.current{
  border-color:var(--amber3);
  color:var(--amber3);
  background:rgba(212,146,42,.22);
  box-shadow:0 0 10px rgba(212,146,42,.3);
  animation:currentPulse 1.5s ease infinite;
}
@keyframes currentPulse{0%,100%{box-shadow:0 0 8px rgba(212,146,42,.3)}50%{box-shadow:0 0 18px rgba(212,146,42,.5)}}
#ov-counter-text{font-size:.7rem;color:var(--text2);letter-spacing:.05em;}

/* ENDING READ MORE BTN */
#ending-readmore{
  display:none;
  margin:0 12px 14px;padding:13px;
  background:rgba(212,146,42,.1);
  border:1px solid rgba(212,146,42,.3);
  border-radius:3px;
  color:var(--amber2);
  font-family:'Shippori Mincho B1',serif;font-size:.88rem;
  letter-spacing:.18em;cursor:pointer;text-align:center;
  -webkit-appearance:none;
  transition:background .15s;
}
#ending-readmore:active{background:rgba(212,146,42,.2);}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <span id="hdr-title">🐾 のらねこ</span>
    <div id="hdr-right">
      <span id="phase-badge">子猫</span>
      <span id="day-badge">1日目</span>
    </div>
  </div>
  <div id="pbar">
    <div class="pi"><div class="pi-label">速さ</div><div class="pi-bw"><div class="pi-b b-spd" id="b-spd"></div></div><div class="pi-val" id="v-spd">1</div></div>
    <div class="pi"><div class="pi-label">パワー</div><div class="pi-bw"><div class="pi-b b-pow" id="b-pow"></div></div><div class="pi-val" id="v-pow">1</div></div>
    <div class="pi"><div class="pi-label">賢さ</div><div class="pi-bw"><div class="pi-b b-smt" id="b-smt"></div></div><div class="pi-val" id="v-smt">1</div></div>
    <div class="pi"><div class="pi-label">愛嬌</div><div class="pi-bw"><div class="pi-b b-chrm" id="b-chrm"></div></div><div class="pi-val" id="v-chrm">1</div></div>
    <div class="pi"><div class="pi-label">迫力</div><div class="pi-bw"><div class="pi-b b-mnc" id="b-mnc"></div></div><div class="pi-val" id="v-mnc">1</div></div>
  </div>
  <div id="illust">
    <div id="illust-bg"></div>
    <div id="illust-fg"></div>
    <div id="special-banner"></div>
    <svg id="illust-svg" viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="60" cy="106" rx="30" ry="4" fill="#000" opacity=".25"/>
      <path d="M36 86 Q18 80 20 64 Q23 50 38 55" stroke="#c8a878" stroke-width="8" fill="none" stroke-linecap="round"/>
      <ellipse cx="63" cy="78" rx="28" ry="20" fill="#c8a878"/>
      <circle cx="63" cy="48" r="23" fill="#c8a878"/>
      <polygon points="44,32 37,10 53,29" fill="#c8a878"/><polygon points="82,32 89,10 73,29" fill="#c8a878"/>
      <polygon points="45,31 39,15 53,28" fill="#e8a0a0" opacity=".65"/><polygon points="81,31 87,15 73,28" fill="#e8a0a0" opacity=".65"/>
      <path d="M50 64 Q63 60 76 64" stroke="#a88040" stroke-width="1.6" fill="none" opacity=".5"/>
      <path d="M48 72 Q63 68 78 72" stroke="#a88040" stroke-width="1.6" fill="none" opacity=".4"/>
      <ellipse cx="55" cy="46" rx="5.5" ry="7" fill="#1a1008"/><ellipse cx="71" cy="46" rx="5.5" ry="7" fill="#1a1008"/>
      <circle cx="56.5" cy="44" r="2" fill="white" opacity=".85"/><circle cx="72.5" cy="44" r="2" fill="white" opacity=".85"/>
      <ellipse cx="63" cy="55" rx="3.5" ry="2.2" fill="#c07080"/>
      <path d="M60 57.5 Q63 61 66 57.5" stroke="#a06070" stroke-width="1.1" fill="none"/>
      <line x1="37" y1="53" x2="56" y2="55.5" stroke="#e8d8b8" stroke-width=".9" opacity=".65"/>
      <line x1="37" y1="58" x2="56" y2="57" stroke="#e8d8b8" stroke-width=".9" opacity=".65"/>
      <line x1="70" y1="55.5" x2="89" y2="53" stroke="#e8d8b8" stroke-width=".9" opacity=".65"/>
      <line x1="70" y1="57" x2="89" y2="58" stroke="#e8d8b8" stroke-width=".9" opacity=".65"/>
    </svg>
  </div>
  <div id="scroll">
    <div id="tbox"><div id="scene-lbl"></div><div id="narr"></div></div>
    <div id="delta"></div>
    <div id="choices"></div>
    <button id="ending-readmore" onclick="onEndingReadmore()">── エンディングへ ──</button>
    <button id="cont" onclick="onContinue()">── つづける ──</button>
  </div>
  <div id="hprow">
    <span id="hp-lbl">体力</span>
    <div id="hp-bw"><div id="hp-b"></div></div>
    <span id="hp-val"></span>
  </div>
  <div id="curtain"></div>
  <div id="lvl-banner"><div id="lvl-inner"></div></div>
  <div id="ov">
    <div id="ov-title"></div>
    <div id="ov-poem"></div>
    <div class="ov-div"></div>
    <div id="ov-story"></div>
    <div class="ov-div"></div>
    <div id="ov-counter">
      <div id="ov-counter-title">── エンディング達成 ──</div>
      <div id="ov-counter-icons"></div>
      <div id="ov-counter-text"></div>
    </div>
    <div id="ov-stats"></div>
    <div id="ov-mask"><div id="ov-mask-title">── 魂の記録 ──</div><div id="ov-mask-text"></div></div>
    <button id="ov-btn" onclick="resetGame()">もういちど</button>
  </div>
</div>

<script>
// ================================================================
// STATE
// ================================================================
let S={};
const PMAX=15;

function newState(){
  S={
    day:1,hp:10,maxHp:10,
    spd:1,pow:1,smt:1,chrm:1,mnc:1,
    guts:0,kind:0,cruel:0,solo:0,  // solo=孤独耐性
    specialUsed:{},
  };
}

// ================================================================
// HELPERS
// ================================================================
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rnd=()=>Math.random();
const pct=v=>Math.round(clamp(v/PMAX,0,1)*100)+'%';
const nm=()=>S.name||'この猫';

function apply(deltas){
  const prev={spd:S.spd,pow:S.pow,smt:S.smt,chrm:S.chrm,mnc:S.mnc,hp:S.hp,maxHp:S.maxHp};
  deltas.forEach(d=>{
    if(d.s==='spd')  S.spd  =clamp(S.spd  +d.v,1,PMAX);
    else if(d.s==='pow')  S.pow  =clamp(S.pow  +d.v,1,PMAX);
    else if(d.s==='smt')  S.smt  =clamp(S.smt  +d.v,1,PMAX);
    else if(d.s==='chrm') S.chrm =clamp(S.chrm +d.v,1,PMAX);
    else if(d.s==='mnc')  S.mnc  =clamp(S.mnc  +d.v,1,PMAX);
    else if(d.s==='hp')   S.hp   =clamp(S.hp   +d.v,0,S.maxHp);
    else if(d.s==='maxhp'){S.maxHp+=d.v;S.hp=clamp(S.hp+d.v,0,S.maxHp);}
    else if(d.s==='guts') S.guts =clamp(S.guts +d.v,0,15);
    else if(d.s==='kind') S.kind =clamp(S.kind +d.v,0,15);
    else if(d.s==='cruel')S.cruel=clamp(S.cruel+d.v,0,15);
    else if(d.s==='solo') S.solo =clamp(S.solo +d.v,0,15);
  });
  return prev;
}

// ================================================================
// SCENE BACKGROUNDS
// ================================================================
const SCENES={
  alley_night:{bg:'radial-gradient(ellipse at 50% 100%,#18283a 0%,#06090f 70%)',fg:()=>''},
  alley_day:  {bg:'radial-gradient(ellipse at 50% 0%,#2a3a1a 0%,#0e1408 70%)',fg:()=>''},
  alley_rain: {bg:'radial-gradient(ellipse at 50% 100%,#162030 0%,#060810 70%)',fg:rainFg},
  park_day:   {bg:'radial-gradient(ellipse at 30% 10%,#384828 0%,#111808 75%)',fg:()=>''},
  park_night: {bg:'radial-gradient(ellipse at 50% 80%,#121830 0%,#040608 70%)',fg:starFg},
  harbor:     {bg:'radial-gradient(ellipse at 60% 100%,#162838 0%,#050c12 70%)',fg:()=>''},
  rooftop:    {bg:'radial-gradient(ellipse at 50% 0%,#404858 0%,#10121a 70%)',fg:skyFg},
  snowfield:  {bg:'radial-gradient(ellipse at 50% 0%,#283038 0%,#080c10 80%)',fg:snowFg},
  shrine:     {bg:'radial-gradient(ellipse at 40% 20%,#382818 0%,#0e0a06 75%)',fg:()=>''},
  river:      {bg:'radial-gradient(ellipse at 50% 100%,#182838 0%,#060a0e 70%)',fg:()=>''},
  summer:     {bg:'radial-gradient(ellipse at 50% 0%,#3a4020 0%,#0e1206 75%)',fg:()=>''},
  cave:       {bg:'radial-gradient(ellipse at 50% 100%,#1a1008 0%,#040200 80%)',fg:caveFg},
  mansion:    {bg:'radial-gradient(ellipse at 30% 0%,#2a1a30 0%,#080508 75%)',fg:()=>''},
  wasteland:  {bg:'radial-gradient(ellipse at 50% 50%,#2a2010 0%,#080600 80%)',fg:()=>''},
};

function rainFg(){let s='';for(let i=0;i<18;i++){const x=Math.random()*120,y=Math.random()*140,l=6+Math.random()*10;s+=`<line x1="${x}" y1="${y}" x2="${x+2}" y2="${y+l}" stroke="#8ab0d0" stroke-width=".7" opacity="${.15+Math.random()*.25}"/>`;}return `<svg viewBox="0 0 120 140" style="position:absolute;inset:0;width:100%;height:100%">${s}</svg>`;}
function starFg(){let s='';for(let i=0;i<28;i++){const x=Math.random()*120,y=Math.random()*60,r=.4+Math.random()*.9;s+=`<circle cx="${x}" cy="${y}" r="${r}" fill="white" opacity="${.25+Math.random()*.55}"/>`;}return `<svg viewBox="0 0 120 140" style="position:absolute;inset:0;width:100%;height:100%">${s}</svg>`;}
function skyFg(){return `<svg viewBox="0 0 120 140" style="position:absolute;inset:0;width:100%;height:100%"><ellipse cx="90" cy="18" rx="20" ry="18" fill="#e8c060" opacity=".16"/><ellipse cx="90" cy="18" rx="11" ry="10" fill="#f0d080" opacity=".2"/></svg>`;}
function snowFg(){let s='';for(let i=0;i<22;i++){const x=Math.random()*120,y=Math.random()*100;s+=`<circle cx="${x}" cy="${y}" r="${.4+Math.random()*.7}" fill="white" opacity="${.2+Math.random()*.45}"/>`;}return `<svg viewBox="0 0 120 140" style="position:absolute;inset:0;width:100%;height:100%">${s}</svg>`;}
function caveFg(){return `<svg viewBox="0 0 120 140" style="position:absolute;inset:0;width:100%;height:100%"><ellipse cx="60" cy="20" rx="25" ry="12" fill="#c09030" opacity=".1"/><circle cx="60" cy="18" r="5" fill="#e8c060" opacity=".15"/></svg>`;}

function setScene(key){
  const sc=SCENES[key]||SCENES.alley_day;
  document.getElementById('illust-bg').style.background=sc.bg;
  document.getElementById('illust-fg').innerHTML=sc.fg();
}

// UI UPDATE

function updateUI(prev){
  ['spd','pow','smt','chrm','mnc'].forEach(p=>{
    const v=S[p];
    document.getElementById('b-'+p).style.width=pct(v);
    const el=document.getElementById('v-'+p);
    el.textContent=v;
    if(prev&&S[p]>prev[p]){
      el.classList.remove('leveled');void el.offsetWidth;
      el.classList.add('leveled');
      setTimeout(()=>el.classList.remove('leveled'),600);
    }
  });
  const hpP=S.maxHp>0?clamp(S.hp/S.maxHp,0,1)*100:0;
  document.getElementById('hp-b').style.width=hpP+'%';
  document.getElementById('hp-b').style.background=hpP<30?'linear-gradient(90deg,#7a1010,#b03030)':'linear-gradient(90deg,#b04040,#e06060)';
  document.getElementById('hp-val').textContent=`${S.hp} / ${S.maxHp}`;
  document.getElementById('day-badge').textContent=`${S.day}日目`;
  const total=S.spd+S.pow+S.smt+S.chrm+S.mnc;
  document.getElementById('phase-badge').textContent=total<18?'子猫':total<32?'若猫':total<48?'一人前':'老練';
}

function showDeltas(deltas){
  const area=document.getElementById('delta');
  // マスクデータ(guts/kind/cruel/solo)はチップ表示しない
  const vis=deltas.filter(d=>!['guts','kind','cruel','solo'].includes(d.s));
  if(!vis.length){area.innerHTML='';return;}
  const row=document.createElement('div');row.className='delta-row';
  const names={spd:'速さ',pow:'パワー',smt:'賢さ',chrm:'愛嬌',mnc:'迫力',hp:'体力',maxhp:'最大体力'};
  vis.forEach(d=>{
    const chip=document.createElement('span');
    chip.className='dc '+(d.s==='hp'||d.s==='maxhp'?'dc-hp':d.v>0?'dc-gain':'dc-loss');
    chip.textContent=`${names[d.s]||d.s} ${d.v>0?'+':''}${d.v}`;
    row.appendChild(chip);
  });
  area.innerHTML='';area.appendChild(row);
}

function flashLevelUp(p){
  const names={spd:'速さ',pow:'パワー',smt:'賢さ',chrm:'愛嬌',mnc:'迫力'};
  const el=document.getElementById('lvl-banner');
  document.getElementById('lvl-inner').textContent=`${names[p]} が上がった！`;
  el.style.display='block';
  setTimeout(()=>el.style.display='none',1050);
}

function showSpecialBanner(text){
  const el=document.getElementById('special-banner');
  el.textContent=text;el.style.display='block';
  setTimeout(()=>el.style.display='none',3000);
}

      :`板前に水をかけられ、びしょ濡れで逃げた。\n<span class="hl-loss">体力が少し減った。</span>`},
   {text:'遠くから様子を伺う',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'hp',v:2}],
    result:`板前が去ったあと、ゆっくりアラをもらった。\n慎重さが身についた。<span class="hl-gain">賢さが上がった。</span>`},
 ]},

{id:'wounded_bird',label:'── 傷ついた鳥 ──',scene:'park_day',
 text:S=>`草むらに、翼を怪我したすずめがいた。\n飛べずにぴょんぴょん跳ねている。\nお腹は少し減っている。`,
 choices:[
   {text:'躊躇わず仕留める',hints:[{t:'pow',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'pow',v:1},{s:'cruel',v:2},{s:'hp',v:4}],
    result:`本能のまま行動した。腹は満たされた。\n<span class="hl-gain">パワーが上がり、体力が回復した。</span>\nなんとなく、しばらく空を見上げた。`},
   {text:'近づいて匂いを嗅ぐだけにする',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'kind',v:2},{s:'smt',v:1}],
    result:`ちいさな命の鼓動を感じた。\nなぜかそのまま立ち去った。\n<span class="hl-gain">賢さが上がった。</span>\n空腹はつづく。`},
   {text:'追いかけ回して遊ぶ',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'cruel',v:1}],
    result:`鳥は必死に逃げた。追いかけることで足が速くなった。\n<span class="hl-gain">速さが上がった。</span>`},
 ]},

{id:'lost_kitten',label:'── 迷子の仔猫 ──',scene:'alley_night',
 text:S=>`夜の路地で、生まれて間もない仔猫が一匹、\n親とはぐれて鳴き続けていた。\n親の姿はどこにもない。\n自分もかつてはこうだったと、ふと思う。`,
 choices:[
   {text:'自分の食べ物を分けてやる',hints:[{t:'chrm',s:'+'}],
    deltas:[{s:'kind',v:2},{s:'chrm',v:1},{s:'hp',v:-1}],
    result:`仔猫は少し落ち着いた。\n${nm()}は自分の境遇を思い出しながら、食べ物を与えた。\n<span class="hl-gain">愛嬌が上がった。</span>`},
   {text:'夜明けまで傍にいて守る',hints:[{t:'mnc',s:'+'}],
    deltas:[{s:'guts',v:1},{s:'kind',v:1},{s:'mnc',v:1}],
    result:`夜明けまで傍に居続けた。翌朝、人間が仔猫を保護した。\n<span class="hl-gain">迫力が上がった。</span>`},
   {text:'自分には関係ないと去る',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'cruel',v:1},{s:'spd',v:1},{s:'solo',v:1}],
    result:`野良に感情移入は禁物だ、と言い聞かせた。\n仔猫の鳴き声がしばらく頭から離れなかった。\n<span class="hl-gain">速さが上がった。</span>`},
 ]},

{id:'summer_heat',label:'── 猛暑の昼 ──',scene:'summer',
 text:S=>`灼熱の夏。アスファルトが焼けて足裏が熱い。\n体の水分がどんどん失われていく。\n遠くに公園の噴水が見えるが、人が多い。\n\n賢さ：${S.smt}`,
 choices:[
   {text:'噴水に一直線に向かう',hints:[{t:'spd',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'hp',v:3}],
    result:`子どもたちの横をすり抜け、噴水で水を飲んだ。\n涼しくなった。<span class="hl-gain">速さが上がり体力回復！</span>`},
   {text:'コンビニの入口に陣取る',hints:[{t:'smt',s:'+'},{t:'chrm',s:'+'}],
    deltas:S=>S.smt>=5?[{s:'smt',v:1},{s:'chrm',v:1},{s:'hp',v:5}]:[{s:'smt',v:1},{s:'hp',v:2}],
    result:S=>S.smt>=5
      ?`店員が水とご飯をくれた。賢い選択だった。\n<span class="hl-strong">賢さと愛嬌が上がり、たっぷり体力回復！</span>`
      :`しばらくして追い払われたが、涼めた。\n<span class="hl-gain">賢さが上がった。</span>`},
   {text:'地面に伏せて夕方まで耐える',hints:[{t:'hp',s:'-'}],
    deltas:[{s:'guts',v:1},{s:'hp',v:-1}],
    result:`日が暮れて涼しくなった。\n<span class="hl-loss">体力は少し減ったが</span>、耐えた。`},
 ]},

{id:'garbage_day',label:'── ゴミ収集日の朝 ──',scene:'alley_day',
 text:S=>`今日はゴミ収集日。\nカラスや野良猫たちが集まっている。\n食べ物は豊富だが競争も激しい。\n\n速さ：${S.spd}　迫力：${S.mnc}`,
 choices:[
   {text:'最速で一番いいものを取る',hints:[{t:'spd',s:'+'},{t:'smt',s:'+'}],
    deltas:S=>S.spd>=5?[{s:'spd',v:1},{s:'smt',v:1},{s:'hp',v:4}]:[{s:'spd',v:1},{s:'hp',v:2}],
    result:S=>S.spd>=5
      ?`誰より早く動き、上等な魚をゲットした。\n誰も${nm()}の速さについてこれなかった。\n<span class="hl-strong">速さと賢さが上がり、体力が大幅回復！</span>`
      :`他の猫と争いながらもそこそこの戦果を得た。\n<span class="hl-gain">速さが上がった。</span>`},
   {text:'他の猫を威圧して独占する',hints:[{t:'mnc',s:'+'},{t:'pow',s:'+'}],
    deltas:S=>S.mnc>=5?[{s:'mnc',v:1},{s:'pow',v:1},{s:'cruel',v:1},{s:'hp',v:5}]:[{s:'mnc',v:1},{s:'cruel',v:1},{s:'hp',v:2}],
    result:S=>S.mnc>=5
      ?`${nm()}の迫力に周囲が圧倒された。食べ物を独占した。\n<span class="hl-strong">迫力とパワーが上がった！</span>`
      :`何匹かは怯んだが、全員は退かなかった。\n<span class="hl-gain">迫力が上がった。</span>`},
   {text:'端っこで静かに残り物をもらう',hints:[],
    deltas:[{s:'kind',v:1},{s:'solo',v:1},{s:'hp',v:2}],
    result:`争わずに済んだ。残り物でも腹は満たせた。\nひとりで食べるのには、もう慣れた。`},
 ]},

// ── ゆるいイベント：昼寝 ──
{id:'sunny_nap',label:'── 日向ぼっこ ──',scene:'park_day',
 text:S=>`ぽかぽかした昼下がり、コンクリートの上が暖かい。\n特に何も起きない、ただの午後だった。\n\n${nm()}は目を細めながら、のびをした。`,
 choices:[
   {text:'そのままうとうとする',hints:[{t:'hp',s:'+'}],
    deltas:[{s:'hp',v:3},{s:'guts',v:1},{s:'solo',v:1}],
    result:`気づいたら夕方だった。\nこういう日も悪くない。\n<span class="hl-gain">体力が回復した。</span>`},
   {text:'鳥を目で追いながら過ごす',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:1},{s:'solo',v:1}],
    result:`カラスが飛んだ。すずめが跳ねた。\nただそれだけを、ずっと見ていた。\n<span class="hl-gain">速さが上がった。</span>`},
   {text:'通りすがりの猫に挨拶してみる',hints:[{t:'chrm',s:'+'}],
    deltas:[{s:'chrm',v:1},{s:'kind',v:1},{s:'solo',v:-1}],
    result:`相手は少し驚いて、でもしっぽを立てた。\n悪い気分じゃなかった。\n<span class="hl-gain">愛嬌が上がった。</span>`},
 ]},

// ── ゆるいイベント：段ボール箱 ──
{id:'cardboard_box',label:'── 謎の箱 ──',scene:'alley_day',
 text:S=>`路地に大きな段ボール箱が落ちていた。\n穴が開いていて、ちょうど頭が入るくらいの隙間がある。\nなぜか気になって仕方がない。`,
 choices:[
   {text:'とりあえず頭を突っ込んでみる',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'solo',v:1}],
    result:`中は暗くて、少し湿っていた。\nなんとなく落ち着く。\n${nm()}は少しの間そのまま動かなかった。\n<span class="hl-gain">賢さが上がった。</span>`},
   {text:'箱ごと占領する',hints:[{t:'mnc',s:'+'}],
    deltas:[{s:'mnc',v:1},{s:'solo',v:1},{s:'hp',v:2}],
    result:`箱の中で丸まった。最高の基地ができた。\n通りすがりの猫が羨ましそうにしていた。\n<span class="hl-gain">迫力が上がった。</span>`},
   {text:'箱の外側で爪を研ぐ',hints:[{t:'pow',s:'+'}],
    deltas:[{s:'pow',v:1}],
    result:`ガリガリと、気持ちよく爪が研げた。\n箱は少しボロボロになった。\n<span class="hl-gain">パワーが上がった。</span>`},
 ]},

// ── ゆるいイベント：自分の影 ──
{id:'own_shadow',label:'── あれはなんだ ──',scene:'park_day',
 text:S=>`夕方、西日の中を歩いていた。\nふと気づくと、地面に長い影が伸びていた。\n${nm()}は立ち止まり、その影をじっと見た。\n……なんか、動いた気がする。`,
 choices:[
   {text:'パンチする',hints:[{t:'pow',s:'+'},{t:'spd',s:'+'}],
    deltas:[{s:'pow',v:1},{s:'spd',v:1}],
    result:`影は逃げなかった。\nそれでも${nm()}は何度も追いかけた。\n気づいたら夕日が沈んでいた。\n<span class="hl-gain">パワーと速さが上がった！</span>`},
   {text:'しばらく観察してから立ち去る',hints:[{t:'smt',s:'+'}],
    deltas:[{s:'smt',v:1},{s:'solo',v:1}],
    result:`影は自分だと、すぐわかった。\nでも少し考えてしまった。\n<span class="hl-gain">賢さが上がった。</span>`},
 ]},

// ── ゆるいイベント：テレビの音 ──
{id:'tv_sound',label:'── 聞こえてくる音 ──',scene:'alley_night',
 text:S=>`夜、民家の窓からテレビの笑い声が聞こえてきた。\n温かい光が、カーテン越しに漏れている。\nお腹はそんなに減っていない。ただ、立ち止まってしまった。`,
 choices:[
   {text:'窓の外でしばらく聞いている',hints:[{t:'chrm',s:'+'}],
    deltas:S=>rnd()<0.35+S.chrm*0.06
      ?[{s:'chrm',v:1},{s:'kind',v:1},{s:'hp',v:3},{s:'solo',v:-1}]
      :[{s:'chrm',v:1},{s:'solo',v:-1}],
    result:S=>S.hp>8
      ?`窓が少し開いて、おじさんが顔を出した。\n「おっ、いたのか」と魚をくれた。\n<span class="hl-gain">愛嬌が上がり、体力も回復した。</span>`
      :`笑い声はずっと続いていた。\n${nm()}はその場を離れた。\n<span class="hl-gain">愛嬌が上がった。</span>`},
   {text:'気にせず立ち去る',hints:[],
    deltas:[{s:'solo',v:1},{s:'guts',v:1}],
    result:`自分には関係のない温もりだ。\nそう思って、歩き続けた。`},
 ]},

// ── ゆるいイベント：蝶 ──
{id:'butterfly',label:'── 蝶 ──',scene:'park_day',
 text:S=>`春の公園に、大きな蝶が飛んでいた。\nひらひらと、まるで${nm()}をからかうように。\n気づいたら前足が出ていた。`,
 choices:[
   {text:'全力で追いかける',hints:[{t:'spd',s:'+'}],
    deltas:[{s:'spd',v:1}],
    result:`蝶はひらりとかわし続けた。\nまったく捕まえられなかった。\nでも気持ちよかった。\n<span class="hl-gain">速さが上がった。</span>`},
   {text:'お座りして眺める',hints:[],
    deltas:[{s:'smt',v:1},{s:'solo',v:1},{s:'hp',v:1}],
    result:`蝶はやがて遠くへ飛んでいった。\nそれでいい、と思った。\n<span class="hl-gain">賢さが上がった。</span>`},
 ]},

// ── シリアス：置き去りの思い出 ──
{id:'memory_abandoned',label:'── 段ボールの夢 ──',scene:'alley_rain',
 text:S=>`雨の音で、${nm()}は夢を見た。\n産まれたばかりの、あの段ボール箱の夢だ。\n\n目が覚めると、同じような雨の夜だった。\n体の古い傷がじんわりと痛む。`,
 choices:[
   {text:'雨の中をあえて歩く',hints:[{t:'guts',s:'+'}],
    deltas:[{s:'guts',v:2},{s:'solo',v:1},{s:'hp',v:-1}],
    result:`ずぶ濡れになりながら、何かを確かめるように歩いた。\nここまで生き延びた。それだけは本当だ。\n<span class="hl-loss">体力が少し減ったが</span>、何か固まった。`},
   {text:'丸まって朝を待つ',hints:[{t:'hp',s:'+'}],
    deltas:[{s:'hp',v:3},{s:'kind',v:1}],
    result:`夢を思い出しながら、${nm()}は目を閉じた。\nあのとき誰かに助けてほしかった。\nだから自分は、今の自分でいるのかもしれない。\n<span class="hl-gain">体力が回復した。</span>`},
 ]},

// ── シリアス：病気の猫を見つける ──
{id:'sick_cat',label:'── 路地の片隅 ──',scene:'alley_day',
 text:S=>`路地の片隅で、痩せた猫が横たわっていた。\n病気なのか、老いているのか——\n立ち上がれない様子だ。`,
 choices:[
   {text:'傍に寄り添う',hints:[{t:'kind',s:'+'}],
    deltas:[{s:'kind',v:2},{s:'solo',v:-1},{s:'hp',v:-1}],
    result:`${nm()}は何もできなかった。\nただ、傍にいた。\nどれくらいそうしていたかわからない。\n<span class="hl-gain">優しさが上がった。</span>`},
   {text:'食べ物を持ってくる',hints:[{t:'kind',s:'+'},{t:'smt',s:'+'}],
    deltas:[{s:'kind',v:2},{s:'smt',v:1},{s:'hp',v:-2}],
    result:`自分の食べ物の半分を置いてきた。\n翌日、猫はいなかった。食べ物だけが残っていた。\nどちらへ行ったのかは、わからない。\n<span class="hl-gain">優しさと賢さが上がった。</span>`},
   {text:'目をそらして通り過ぎる',hints:[],
    deltas:[{s:'cruel',v:1},{s:'solo',v:1}],
    result:`見なかったことにした。\nでも、その猫の目が頭から離れなかった。`},
 ]},
],

// ══════════════════════════ CH3: 後半の試練 ══════════════════════════
[
{id:'pack_encounter',label:'── 港の群れ ──',scene:'harbor',
 text:S=>`港の倉庫街。5匹ほどの群れが縄張りを持っている。\nここには食べ物が豊富だ。\nリーダー格の猫が近づいてきた。\n\n総合力：${S.spd+S.pow+S.smt+S.chrm+S.mnc}`,
 choices:[
   {text:'群れに入れてほしいと頭を下げる',hints:[{t:'chrm',s:'+'},{t:'smt',s:'+'}],
    deltas:S=>S.chrm>=6?[{s:'smt',v:1},{s:'chrm',v:2},{s:'kind',v:1},{s:'hp',v:4}]:[{s:'smt',v:1},{s:'chrm',v:1},{s:'hp',v:-1}],
    result:S=>S.chrm>=6
      ?`リーダーは少し考えてから、仲間を紹介してくれた。\n食べ物を分けてもらった。\n<span class="hl-strong">愛嬌が大きく上がった！体力も回復！</span>`
      :`断られた。プライドが傷ついたが、無駄な戦いは避けられた。\n<span class="hl-gain">賢さが上がった。</span>`},
   {text:'リーダーに一対一の決闘を申し込む',hints:[{t:'pow',s:'+'},{t:'mnc',s:'+'}],
    deltas:S=>S.pow+S.mnc>=10?[{s:'pow',v:2},{s:'mnc',v:2},{s:'guts',v:1},{s:'hp',v:-3}]:[{s:'hp',v:-6},{s:'guts',v:1}],
    result:S=>S.pow+S.mnc>=10
      ?`激戦だった。全身傷だらけになりながらも、リーダーを打ち負かした。\n群れ全員が${nm()}を認めた。\n<span class="hl-strong">パワーと迫力が大きく上がった！</span>`
      :`相手の経験と実力が上だった。ボロボロになって逃げた。\n<span class="hl-loss">体力が大幅に減った。</span>`},
   {text:'知らないふりで堂々と通り抜ける',hints:[{t:'mnc',s:'+'},{t:'spd',s:'+'}],
    deltas:[{s:'mnc',v:1},{s:'spd',v:1}],
    result:`堂々と無視したら、相手の方が戸惑っていた。\n<span class="hl-gain">迫力と速さが上がった。</span>`},
 ]},

{id:'winter_cold',label:'── 厳冬の夜 ──',scene:'snowfield',
 text:S=>`雪が降り始めた。気温は氷点下。\n体の芯から冷えてくる。\nこのままでは凍えてしまいそうだ。`,
 choices:[
   {text:'民家の軒下に忍び込む',hints:[{t:'smt',s:'+'},{t:'hp',s:'+'}],
    deltas:S=>S.smt>=6?[{s:'smt',v:1},{s:'hp',v:5}]:[{s:'smt',v:1},{s:'hp',v:2}],
    result:S=>S.smt>=6
      ?`人間に気づかれず、暖かい場所で夜を越えた。\n<span class="hl-strong">賢さが上がり、たっぷり体力回復！</span>`
      :`住人に見つかって追い払われた。\nでも少しは暖まれた。<span class="hl-gain">賢さが上がった。</span>`},
   {text:'他の野良猫たちと寄り添う',hints:[{t:'chrm',s:'+'},{t:'hp',s:'+'}],
    deltas:[{s:'chrm',v:1},{s:'kind',v:1},{s:'hp',v:3}],
    result:`見知らぬ猫たちと体を寄せ合って夜を越えた。\n温もりがあった。\n<span class="hl-gain">愛嬌が上がり、体力も回復。</span>`},
   {text:'一人で気合いで乗り越える',hints:[{t:'hp',s:'-'}],
    deltas:S=>S.guts>=6?[{s:'guts',v:2},{s:'maxhp',v:1},{s:'hp',v:-2}]:[{s:'guts',v:2},{s:'hp',v:-4}],
    result:S=>S.guts>=6
      ?`歯を食いしばって夜明けを待った。\n根性が体を強くした。\n<span class="hl-strong">最大体力が増えた！</span>`
      :`全身の毛が霜で白くなっていた。ギリギリ生き延びた。\n<span class="hl-loss">体力は大幅に減った。</span>`},
 ]},

{id:'mate_season',label:'── 恋の季節 ──',scene:'park_night',
 text:S=>`春の夜、近所の猫の鳴き声が響いている。\nライバルの猫が先にそちらへ向かっている。\n\n愛嬌：${S.chrm}　パワー：${S.pow}　迫力：${S.mnc}`,
 choices:[
   {text:'全力で割り込んで勝負する',hints:[{t:'pow',s:'+'},{t:'mnc',s:'+'}],
    deltas:S=>S.pow+S.mnc>=9?[{s:'pow',v:1},{s:'mnc',v:1},{s:'guts',v:1},{s:'hp',v:-2}]:[{s:'hp',v:-4},{s:'guts',v:1}],
    result:S=>S.pow+S.mnc>=9
      ?`ライバルを圧倒した。この夜の主役になった。\n<span class="hl-strong">パワーと迫力が上がった！</span>`
      :`ライバルに完敗した。傷だらけで帰った。\n<span class="hl-loss">体力が大幅に減った。</span>`},
   {text:'愛嬌を振りまいてアピールする',hints:[{t:'chrm',s:'+'}],
    deltas:S=>S.chrm>=6?[{s:'chrm',v:2},{s:'kind',v:1},{s:'hp',v:2}]:[{s:'chrm',v:1}],
    result:S=>S.chrm>=6
      ?`ライバルよりも可愛げが勝った。\n<span class="hl-strong">愛嬌が大きく上がった！</span>`
      :`ライバルの方が選ばれた。でも愛嬌は磨かれた。\n<span class="hl-gain">愛嬌が上がった。</span>`},
   {text:'冷静に引き下がる',hints:[{t:'smt',s:'+'}],

// ================================================================
// QUEUE BUILDER
// ================================================================
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

// 特殊イベントはプレイ中に条件を満たしたタイミングで次イベントの直前に割り込む
let QUEUE=[], QIDX=0;
let _specialQueue=[...SPECIAL_EVENTS]; // 未使用の特殊イベントプール

function buildQueue(){
  const q=[];
  q.push(...CHAPTERS[0]); // birth
  q.push(...CHAPTERS[1]); // 子猫期 全部
  const ch2=[...CHAPTERS[2]];shuffle(ch2);q.push(...ch2.slice(0,9)); // 若猫期 9本抽選
  const ch3=[...CHAPTERS[3]];shuffle(ch3);q.push(...ch3.slice(0,5)); // 後半 5本
  q.push(...CHAPTERS[4]); // 晩年＋岐路
  return q;
}

// 次のイベントを取得するときに特殊イベントの条件をチェックして割り込ませる
function getNextEvent(){
  // 特殊イベント条件チェック
  for(let i=0;i<_specialQueue.length;i++){
    const sp=_specialQueue[i];
    if(sp.cond(S)&&!S.specialUsed[sp.id]){
      _specialQueue.splice(i,1);
      S.specialUsed[sp.id]=true;
      return sp;
    }
  }
  if(QIDX>=QUEUE.length) return null;
  return QUEUE[QIDX++];
}

// ================================================================
// RENDER
// ================================================================
function renderEvent(ev){
  if(!ev){showEnding('survive');return;}
  setScene(ev.scene||'alley_day');
  document.getElementById('scene-lbl').textContent=ev.label||'';
  const txt=typeof ev.text==='function'?ev.text(S):ev.text;
  document.getElementById('narr').innerHTML=txt.replace(/\n/g,'<br>');
  document.getElementById('delta').innerHTML='';
  document.getElementById('cont').style.display='none';

  if(ev.special&&ev.banner){
    showSpecialBanner(ev.banner);
    document.getElementById('app').classList.add('fx-special');
    setTimeout(()=>document.getElementById('app').classList.remove('fx-special'),650);
  }

  const choicesEl=document.getElementById('choices');
  choicesEl.innerHTML='';
  const hintNames={spd:'速さ',pow:'パワー',smt:'賢さ',chrm:'愛嬌',mnc:'迫力',hp:'体力'};
  // choices は配列または関数(S)=>配列 の両形式に対応
  const choiceList=typeof ev.choices==='function'?ev.choices(S):ev.choices;
  choiceList.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='cbtn';
    // hintsにはspd/pow/smt/chrm/mnc/hpのみ表示（マスク項目は除外）
    const visHints=(c.hints||[]).filter(h=>['spd','pow','smt','chrm','mnc','hp'].includes(h.t));
    const hintsHtml=visHints.length
      ?`<span class="cbtn-hint">${visHints.map(h=>`<span class="hc hc-${h.t}">${hintNames[h.t]}${h.s}</span>`).join('')}</span>`
      :'';
    btn.innerHTML=`<span class="cbtn-main">${c.text}</span>${hintsHtml}`;
    btn.addEventListener('click',()=>choose(ev,c));
    choicesEl.appendChild(btn);
  });
  document.getElementById('scroll').scrollTop=0;
}

function choose(ev,choice){
  document.querySelectorAll('.cbtn').forEach(b=>b.classList.add('disabled'));

  const rawD=choice.deltas;
  const deltas=typeof rawD==='function'?rawD(S):rawD;
  const prev=apply(deltas);
  S.day++;
  if(choice.name) S.name=choice.name;
  updateUI(prev);

  ['spd','pow','smt','chrm','mnc'].forEach(p=>{
    if((S[p]||0)-(prev[p]||0)>=2) flashLevelUp(p);
  });

  const resultTxt=typeof choice.result==='function'?choice.result(S):choice.result;
  document.getElementById('narr').innerHTML=
    (typeof ev.text==='function'?ev.text(S):ev.text).replace(/\n/g,'<br>')+
    `<br><br>${resultTxt}`;

  const gained=S.hp>(prev.hp||0)||S.maxHp>(prev.maxHp||0);
  const lost=S.hp<(prev.hp||0);
  const app=document.getElementById('app');
  if(gained){app.classList.add('fx-gain');setTimeout(()=>app.classList.remove('fx-gain'),500);}
  else if(lost){app.classList.add('fx-loss');setTimeout(()=>app.classList.remove('fx-loss'),500);}

  showDeltas(deltas);
  document.getElementById('choices').innerHTML='';
  document.getElementById('scroll').scrollTop=0;

  // エンディング分岐 or 死亡 → 専用ボタンを表示（curtain演出付き）
  if(S.hp<=0){
    S._pendingEnding='dead';
    showEndingTransitionBtn();
    return;
  }
  if(choice.ending){
    // ending は文字列または関数(S)=>文字列 の両形式に対応
    const endingId=typeof choice.ending==='function'?choice.ending(S):choice.ending;
    S._pendingEnding=endingId;
    showEndingTransitionBtn();
    return;
  }

  // 通常は「つづける」ボタン
  document.getElementById('cont').style.display='block';
}

function showEndingTransitionBtn(){
  // 「エンディングへ」ボタンを表示し、テキストを十分読める時間を確保
  document.getElementById('cont').style.display='none';
  document.getElementById('ending-readmore').style.display='block';
  document.getElementById('scroll').scrollTop=0;
}

function onEndingReadmore(){
  document.getElementById('ending-readmore').style.display='none';
  // カーテン演出（暗転）してからオーバーレイを開く
  const curtain=document.getElementById('curtain');
  curtain.classList.add('falling');
  setTimeout(()=>{
    showEnding(S._pendingEnding||'survive');
    setTimeout(()=>{
      curtain.classList.remove('falling');
    },400);
  },1800);
}

function onContinue(){
  document.getElementById('cont').style.display='none';
  document.getElementById('delta').innerHTML='';
  renderEvent(getNextEvent());
}

function loadUnlocked(){
  try{
    const raw=localStorage.getItem('noraneko_endings');
    return raw?JSON.parse(raw):[];
  }catch(e){return[];}
}
function saveUnlocked(arr){
  try{localStorage.setItem('noraneko_endings',JSON.stringify(arr));}catch(e){}
}
function unlockEnding(id){
  const arr=loadUnlocked();
  if(!arr.includes(id)){arr.push(id);saveUnlocked(arr);}
}

function renderEndingCounter(currentId){
  const unlocked=loadUnlocked();
  const iconsEl=document.getElementById('ov-counter-icons');
  const textEl=document.getElementById('ov-counter-text');
  iconsEl.innerHTML='';
  ALL_ENDINGS.forEach(e=>{
    const div=document.createElement('div');
    div.className='end-icon'+(e.id===currentId?' current':unlocked.includes(e.id)?' unlocked':'');
    div.textContent=unlocked.includes(e.id)||e.id===currentId?e.emoji:'？';
    div.title=unlocked.includes(e.id)||e.id===currentId?e.name:'???';
    iconsEl.appendChild(div);
  });
  const count=unlocked.length;
  const total=ALL_ENDINGS.length;
  // 今回が初解除かチェック
  const isNew=!loadUnlocked().includes(currentId);
  textEl.textContent=`${count} / ${total} 種達成${isNew?' ★ NEW！':''}`;
}

      `\n\nまた明日が来る。\n${nm()}はまた路地へと歩き出す。\nのらねことして。`
  },
};

function showEnding(type){
  // まず今回のエンディングを解除登録（renderEndingCounter呼び出し前に）
  // isNewの判定のため、unlock前にチェック
  const wasLocked=!loadUnlocked().includes(type);
  unlockEnding(type);

  const ed=ENDING_DATA[type]||ENDING_DATA.survive;
  document.getElementById('ov-title').textContent=ed.title;
  const poem=typeof ed.poem==='function'?ed.poem(S):ed.poem;
  document.getElementById('ov-poem').textContent=poem;
  const story=typeof ed.story==='function'?ed.story(S):ed.story;
  document.getElementById('ov-story').innerHTML=story.replace(/\n/g,'<br>');

  const pnames={spd:'速さ',pow:'パワー',smt:'賢さ',chrm:'愛嬌',mnc:'迫力'};
  document.getElementById('ov-stats').innerHTML=
    ['spd','pow','smt','chrm','mnc'].map(p=>
      `<div class="esr"><span class="esn">${pnames[p]}</span><span class="esv">${S[p]}</span></div>`
    ).join('');

  const dom=getDominantMask();
  const maskDescs={
    guts:`根性の猫\n逆境の中でも決して諦めなかった。その魂は傷つきながらも折れることがなかった。`,
    kind:`優しい猫\n弱い者に手を差し伸べ、争いよりも和を選んだ。その温もりが多くの命に触れた。`,
    cruel:`孤高の猫\n感情に流されず、生存を最優先にした。冷酷に見えて、それは野良として生きるための強さだった。`,
    solo:`孤独の猫\nひとりで生き、ひとりで戦い、ひとりで眠った。誰にも頼らないことが、この猫の誇りだった。`,
  };
  document.getElementById('ov-mask-text').textContent=maskDescs[dom]||'';

  // エンディングカウンター（isNewは unlock前のフラグを使う）
  const unlocked=loadUnlocked();
  const count=unlocked.length;
  const total=ALL_ENDINGS.length;
  const iconsEl=document.getElementById('ov-counter-icons');
  iconsEl.innerHTML='';
  ALL_ENDINGS.forEach(e=>{
    const div=document.createElement('div');
    div.className='end-icon'+(e.id===type?' current':unlocked.includes(e.id)?' unlocked':'');
    div.textContent=unlocked.includes(e.id)?e.emoji:'？';
    iconsEl.appendChild(div);
  });
  document.getElementById('ov-counter-text').textContent=
    `${count} / ${total} 種達成`+(wasLocked?' ✦ NEW！':'');

  document.getElementById('ov').classList.add('show');
}

// ================================================================
// INIT
// ================================================================
function resetGame(){
  document.getElementById('ov').classList.remove('show');
  document.getElementById('ending-readmore').style.display='none';
  document.getElementById('cont').style.display='none';
  newState();
  QUEUE=buildQueue();
  QIDX=0;
  _specialQueue=[...SPECIAL_EVENTS];
  updateUI();
  renderEvent(getNextEvent());
}

newState();
QUEUE=buildQueue();
QIDX=0;
_specialQueue=[...SPECIAL_EVENTS];
updateUI();
renderEvent(getNextEvent());
</script>
